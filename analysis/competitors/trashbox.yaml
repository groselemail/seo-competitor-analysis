  examples:
    - "trashbox.ru/link/buckshot-roulette-android"
    - "trashbox.ru/link/poker-offline-texas-holdem-android"
    - "trashbox.ru/link/alcatraz-slots-android"
    - "trashbox.ru/topics/62803/pokerstars"
    - "trashbox.ru/link/online-russian-roulette-android"
  regex: "(?i)(casino|gambling|slots|betting|bets|poker|roulette|jackpot|porn|xxx|adult|nsfw|1xbet|juwa|rummy)"
  source: "trashbox_ru_site_structure_subdomains_ru_2026_03_05_22_44_22.csv"
  extraction: "awk -F'\\t' 'NR>1 && tolower($0) ~ /casino|gambling|.../' | wc -l"

summary: |
  trashbox.ru is confirmed as a single-language (Russian) competitor with NO multilingual
  subdomains or language folders. All 4 subdomains found are either the main domain,
  a www redirect, or legacy Nokia device subdomains (all with zero traffic).

  The site is experiencing massive decline: -893K traffic (-47%), -323K keywords.
  Its audience is exclusively CIS/Russian-speaking (RU 73.8%, KZ 6.8%, BY 5.7%, UZ 4.7%).

  This supports the hypothesis that monolingual Russian software download sites may face
  structural headwinds, making trashbox.ru a relevant control case for the multilingual
  expansion analysis.

  Site structure: ~96% of traffic flows through /link/ (app download pages),
  with /topics/, /games/, and /apps/ as minor content sections.
