# ----------------------------------------------------------
# Comparison with softonic.com
# ----------------------------------------------------------
comparison_note: >
  softonic.ru (DR 50, ~335K traffic from RU filter, declining -578K) uses a separate
  .ru domain with per-app subdomains architecture. Compare with softonic.com (from
  task 05a brief) which uses language subdomains (en.softonic.com, etc.) to evaluate
  separate-domain vs subdomain strategy effectiveness for the Russian market.
  Key observation: softonic.ru traffic is heavily declining (-578K change), suggesting
  this separate-domain strategy may not be performing well.

