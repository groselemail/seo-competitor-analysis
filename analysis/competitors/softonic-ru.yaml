# ----------------------------------------------------------
# Architecture: app-name subdomains
# ----------------------------------------------------------
# softonic.ru uses a unique architecture: each app gets its own subdomain
# e.g., brawl-stars.softonic.ru, minecraft.softonic.ru, telegram.softonic.ru
# www.softonic.ru serves as the main hub with catalog/downloads sections

architecture_note: >
  softonic.ru uses per-app subdomains (e.g., brawl-stars.softonic.ru/android/).
  Each app subdomain has paths like /android/, /iphone/, /download/.
  www.softonic.ru is the main hub with /downloads/ catalog.
  Total unique subdomains: 15,014. Only 568 have traffic > 100.

