    - "https://1xbet.en.uptodown.com/android"
    - "https://1xbet.fr.uptodown.com/android"
    - "https://1xbet.ar.uptodown.com/android"
    - "https://1xbet.ru.uptodown.com/android"
    - "https://1xbet.en.uptodown.com/android/download"
  regex: "(?i)(casino|gambling|slots|betting|bets|poker|roulette|jackpot|porn|xxx|adult|nsfw|букмекер|казино|ставки|порно|1xbet|juwa|rummy)"
  note: >
    Filter applied via awk: tolower($0) ~ /casino|gambling|slots|...|порно/
    Matches checked against entire row (URL + keyword fields).
    Brand names like betpawa, melbet not in regex but may be gambling-related.

# ============================================================
# METHODOLOGY
# ============================================================

methodology:
  csv_processing: "All data extracted with awk/sort/head on tab-delimited UTF-8 CSVs. No files loaded into memory."
  language_detection: >
    URL subdomain parsing: appname.LANG.uptodown.com → LANG;
    LANG.uptodown.com → LANG (if 2-letter code);
    www.uptodown.com or appname.uptodown.com (no lang) → "es" (Spanish default).
  page_type_classification: >
    Based on subdomain count before uptodown.com:
    2+ subdomains = app page with language;
    1 subdomain (not lang code) = app page defaulting to Spanish;
    1 subdomain (2-letter code or www) = category/homepage.
  gambling_filter: "Regex applied before all aggregations. Count of removed rows documented."
  trend_scope: "Comparison CSV has RU country filter. Trend data reflects RU traffic changes only."

