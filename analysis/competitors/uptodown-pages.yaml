  url_path_patterns:
    description: "First URL path segment distribution (across all page types)"
    source: "uptodown_com_top_pages_subdomains_all_act_2026_03_05_23_03_05.csv"
    extraction: "awk: extract first path segment after host, aggregate"
    patterns:
      - segment: "android"
