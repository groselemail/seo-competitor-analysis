# TRAFFIC BY PAGE TYPE
# Classification: subdomain structure determines page type
# - app_page: URL has appname.lang.uptodown.com (2+ subdomains)
# - app_page_no_lang: URL has appname.uptodown.com (1 subdomain, not a language code)
# - category_or_home: URL has lang.uptodown.com or www.uptodown.com
# Source: uptodown_com_top_pages_subdomains_all_act_2026_03_05_23_03_05.csv
# ============================================================

traffic_by_page_type:
  app_pages_with_lang:
    count: 25388
    total_traffic: 25808856
    pct_of_total_traffic: 84.98
    description: "App pages with explicit language subdomain (appname.lang.uptodown.com)"
    source: "uptodown_com_top_pages_subdomains_all_act_2026_03_05_23_03_05.csv"
    extraction: "awk: host split by '.', n>=2 before uptodown.com → app_page"
  app_pages_no_lang:
    count: 3012
    total_traffic: 2938538
    pct_of_total_traffic: 9.68
    description: "App pages without language subdomain (appname.uptodown.com, defaults to Spanish)"
    source: "uptodown_com_top_pages_subdomains_all_act_2026_03_05_23_03_05.csv"
    extraction: "awk: host single subdomain, not 2-letter code and not www"
  category_and_home:
    count: 1279
    total_traffic: 1619075
    pct_of_total_traffic: 5.33
    description: "Language homepages and category listings (lang.uptodown.com/*, www.uptodown.com/*)"
    source: "uptodown_com_top_pages_subdomains_all_act_2026_03_05_23_03_05.csv"
