# Note on traffic discrepancy
traffic_discrepancy:
  overview_png_traffic: 526
  csv_total_traffic: 1395
  note: "PNG shows 526 (possibly filtered differently or snapshot timing). CSV sums to 1395. This is a known Ahrefs artifact ‚Äî site_structure reports can include subdomain/CDN entries that inflate totals. The 526 figure from overview is the authoritative organic traffic number for the main domain."

