# ---------------------------------------------------------------------------
# Key findings for competitor analysis
# ---------------------------------------------------------------------------
findings:
  - finding: "filehippo uses language FOLDERS, not single-language"
    detail: "Contrary to initial assumption, filehippo.com has /{lang}/ folders for es, fr, it, zh, jp, de, pl (7 non-English languages)."
    implication: "filehippo is NOT a valid 'single-language control case'. It attempted multilingual expansion via folders."

  - finding: "Multilingual expansion failed ‚Äî near-zero non-English traffic"
    detail: "Despite ~5,500-5,700 pages each in es/fr/it/zh folders, only Spanish has any traffic (16, or 1.1%). French, Italian, Chinese, others = 0 traffic."
    implication: "Having multilingual pages does NOT guarantee traffic. Quality of localization and domain authority in target markets matter more."

  - finding: "Traffic concentrated in English and non-English-speaking countries"
    detail: "Top countries: India (24.3%), Pakistan (13.2%), Colombia (6.5%), Bangladesh (6.3%). English content serves South Asian audience. Spanish folder likely targets LATAM but with minimal RU-visible traffic."
    implication: "filehippo's English content serves ESL markets. The /es/ folder exists for LATAM but has negligible RU-filtered traffic."

  - finding: "Site is in steep decline"
    detail: "Keywords dropped 17.5K. DR 77 but only 526 traffic (RU). Backlinks data unavailable. AR 23,625 (dropped 8,904)."
    implication: "filehippo is losing organic visibility. Not a strong model to emulate."

  - finding: "Infrastructure-heavy subdomain structure"
    detail: "42 subdomains, 35 of which are CDN/file servers (fs*, dl*, cache, cdn1). Only main domain has organic traffic."
    implication: "CDN subdomains add noise to site_structure data but carry no SEO value."
