# CRITICAL: This CSV is an Ahrefs export with RU country filter.
# All traffic numbers represent organic traffic from RUSSIAN search only.
# This explains why ru subdomain dominates (91.93%) — it's the filter effect,
# not the actual global language distribution of uptodown.com.
csv_filter: "RU (Russian search results)"

# -----------------------------------------------------------------------------
# Language structure
# -----------------------------------------------------------------------------
language_structure: "subdomains"
language_pattern: "{app-name}.{lang}.uptodown.com"
language_root_pattern: "{lang}.uptodown.com"
examples:
  - "tiktok.ru.uptodown.com → Russian subdomain, TikTok app page"
  - "crushon-ai.en.uptodown.com → English subdomain"
  - "ru.uptodown.com → Russian language root (traffic: 12,130)"
  - "en.uptodown.com → English language root (traffic: 592)"

