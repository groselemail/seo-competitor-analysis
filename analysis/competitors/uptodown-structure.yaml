# -----------------------------------------------------------------------------
# Gambling filter
# -----------------------------------------------------------------------------
gambling_filtered:
  entries_removed_total: 541
  entries_removed_total_note: "All entries (including sub-paths) matching gambling regex"
  root_subdomains_removed: 239
  root_subdomains_removed_note: "Root subdomains only (no sub-paths)"
  traffic_removed: 18788
  traffic_removed_note: "Sum of traffic from gambling root subdomains"
  traffic_removed_share_pct: 1.91
  examples:
    - "1xbet.ru.uptodown.com (traffic: 11620)"
    - "riobet-casino.ru.uptodown.com (traffic: 1221)"
    - "1xbet.en.uptodown.com (traffic: 703)"
    - "1xcasino.ru.uptodown.com (traffic: 698)"
    - "pin-up-slots.ru.uptodown.com (traffic: 675)"
  regex: "(?i)(casino|gambling|slots|betting|bets|poker|roulette|jackpot|porn|xxx|adult|nsfw|1xbet|juwa|rummy|букмекер|казино|ставки|порно)"
  awk_filter: "tolower($0) ~ /casino|gambling|slots|betting|bets|poker|roulette|jackpot|porn|xxx|adult|nsfw|1xbet|juwa|rummy|букмекер|казино|ставки|порно/"
  gap_note: "Additional betting domains NOT caught by regex: melbet (7663 traffic), bet365 (415), 22bet-app (258), mostbet (171+82), bwin-sports (52), betsson (46). These contain 'bet' but regex only matches 'bets' or 'betting'. Consider extending regex with |melbet|mostbet|bet365|22bet|bwin"

