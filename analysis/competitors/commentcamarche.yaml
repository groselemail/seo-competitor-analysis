key_insights:
  - insight: "How-to content dominates, not downloads"
    detail: "applis-sites (28.4%) + informatique (8.8%) + maison (8.0%) + mobile (2.7%) = 47.9% of traffic from editorial how-to content vs 10.6% from /telecharger/ downloads"
    relevance: "commentcamarche.net is primarily a how-to site that happens to have downloads, not a download site. Different competitive positioning than clubic.com or 01net.com."

  - insight: "Forum is massive by pages but moderate by traffic"
    detail: "25,290 forum pages (84.6% of all pages) generate only 30.4% of traffic (71,957). Each forum page averages 2.8 traffic vs 14.4 for www pages."
    relevance: "UGC forum content provides long-tail SEO foundation but declining value. Modern search engines devalue forum content."

  - insight: "Download section is a secondary traffic driver"
    detail: "2,290 download pages generate 25,007 traffic (10.6%). Top download software: clavier arabe (2,212), PhotoFiltre (1,025), AdwCleaner (597), CCleaner (570)."
    relevance: "For freesoft.net French expansion: downloads alone are not enough. Must pair with how-to content to compete in French market."

  - insight: "Single page dominates total traffic"
    detail: "wannonce article (35,548) = 15.0% of total site traffic. Top 3 pages = 30.2% of total. Extreme concentration."
    relevance: "Site is vulnerable to single-page traffic loss. Decline likely reflects loss of key ranking positions."

  - insight: "Security/antivirus downloads still have French demand"
    detail: "AdwCleaner (597), CCleaner (570), Malwarebytes (238), JRT (418), Spybot (194) — security tools still drive downloads."
    relevance: "freesoft.net can target these French-language security tool queries with FR content."

  - insight: "Legacy software queries persist in French"
    detail: "Adobe Flash Player (314), Delphi 7 (221), Microsoft Word 2013 (470), Windows 7 USB tool (207) — outdated software still searched."
