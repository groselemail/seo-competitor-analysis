    Language extracted from URL structure:
    - www.malavida.com/LANG/... → folder-based lang
    - appname.LANG.malavida.com/... → subdomain lang code (2-letter)
    - appname.malavida.com/... (no lang code) → default Spanish (es)
    - LANG.malavida.com/... → lang subdomain
