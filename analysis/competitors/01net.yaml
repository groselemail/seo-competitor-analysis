# ============================================================
# KEY INSIGHTS FOR COMPETITIVE ANALYSIS
# ============================================================

insights:
  - id: "01net-massive-decline"
    finding: >
      01net.com is in severe decline: -2.2M traffic (-59%), -925K keywords (-87%).
      France alone lost -1.4M traffic. This is the largest French competitor
      experiencing catastrophic organic visibility loss.
    implication: "Enormous opportunity to capture French software download traffic"

  - id: "01net-downloads-still-strong"
    finding: >
      Software downloads (/telecharger/) still generate 662K traffic (46.5% of total)
      across 7,875 pages. This is the strongest content vertical by far.
    implication: "Download pages are the most resilient content type during the decline"

  - id: "01net-chatgpt-dominance"
    finding: >
      Single page (ChatGPT download) generates 111,600 traffic — 7.8% of all clean traffic.
      AI tools category: 49 pages but 114K traffic (avg 2,334/page).
    implication: "AI tool download pages have extreme traffic density"

  - id: "01net-vpn-affiliate-model"
    finding: >
      VPN content generates 218K traffic (15.3%) across 1,388 pages including
      multi-language (/en/, /es/, /it/, /tr/, /de/) affiliate content.
      Top VPN page is 97K traffic for unblocking tukif.
    implication: "01net monetizes via VPN affiliate content across 5+ languages"

  - id: "01net-news-low-efficiency"
    finding: >
      News (/actualites/) has 9,035 pages but only 130K traffic (14.4 avg/page).
      Tests (/tests/) has 5,928 pages but only 61.5K traffic (10.4 avg/page).
      These are low-efficiency content types.
    implication: "News and reviews content has very low per-page traffic efficiency"

  - id: "01net-francophone-africa"
    finding: >
      Francophone Africa (Algeria, Morocco, Congo, Cote D'Ivoire, Senegal,
      Cameroon, Tunisia, Madagascar, Gabon) collectively ~25% of traffic.
      All markets declining. This is software demand from French-speaking Africa.
    implication: "Francophone Africa is a secondary market for FR software content"

  - id: "01net-dossiers-high-value"
    finding: >
      Dossiers (/dossiers/) are only 38 pages but 158K traffic (4,162 avg/page).
      Includes streaming sites, ebook downloads, music downloads, software roundups.
    implication: "Aggregation/roundup content has the highest per-page value"

  - id: "01net-url-pattern"
    finding: >
      Download URL pattern: /telecharger/{category}/{subcategory}/{app-name}.html
      Categories use French names (multimedia, bureautique, utilitaires, jeux, securite).
    implication: "French URL structure for software downloads — relevant for freesoft.fr URL planning"
