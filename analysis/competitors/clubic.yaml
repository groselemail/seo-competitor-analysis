# ------------------------------------------------------------
# Key competitive insights for frees0ft.fr
# ------------------------------------------------------------
competitive_insights:
  - insight: "Software downloads dominate clubic.com traffic (80%)"
    detail: "6,763 download pages generate 978K traffic — 80% of site total. News (10K pages) generates only 101K traffic (8%)."
    implication: "Download pages are the primary traffic driver in French software market. frees0ft.fr should prioritize download page quality."
  - insight: "Messaging apps are traffic monsters"
    detail: "Just 21 messaging app pages generate 225K traffic (23% of all download traffic). GBWhatsApp alone = 134K."
    implication: "High-demand app categories (messaging, social media) offer outsized returns per page."
  - insight: "French URL patterns use 'telecharger' not 'download'"
    detail: "All download URLs use /telecharger-fiche/ pattern. Top keyword for index is 'telecharger'."
    implication: "frees0ft.fr French pages should use 'telecharger' in URLs, titles, and H1s."
  - insight: "Long-tail software pages have modest but consistent traffic"
    detail: "Average download page gets 145 traffic. Median is likely much lower — top pages skew heavily."
    implication: "Volume strategy works: 6,374 app pages × ~145 avg = massive aggregate traffic."
  - insight: "VPN and antivirus are low-traffic in French download market"
    detail: "VPN: 56 pages, 1,646 traffic (29 avg). Antivirus: 53 pages, 2,749 traffic (52 avg)."
    implication: "These verticals may perform better in RU/EN markets. French users search differently for security software."
  - insight: "Flat URL structure works at scale"
    detail: "clubic.com uses telecharger-ficheXXXXXX-name.html — flat, no category hierarchy in URL."
    implication: "Simple, flat URL structure can work for 6K+ download pages."

