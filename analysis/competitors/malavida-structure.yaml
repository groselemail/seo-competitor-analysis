# ----- Gambling / adult content filter -----
gambling_filtered:
  entries_removed: 191
  traffic_removed: 524
  examples:
    - "pokerstars-poker.ru.malavida.com/android"
    - "pokerstars-poker.ru.malavida.com"
    - "buckshot-roulette.ru.malavida.com/android"
    - "cleopatra-casino.ru.malavida.com"
    - "world-poker-club.ru.malavida.com"
    - "scatter-slots.ru.malavida.com"
    - "royal-casino.ru.malavida.com"
  regex: "(?i)(casino|gambling|slots|betting|bets|poker|roulette|jackpot|porn|xxx|adult|nsfw|букмекер|казино|ставки|порно|1xbet|juwa|rummy)"
  extraction: "awk -F'\\t' 'NR>1 && tolower($0) ~ /casino|gambling|.../' file.csv | wc -l"
  note: "191 entries matched; 524 total RU traffic. All within ru.malavida.com subdomain. Includes game titles containing 'roulette', 'poker', 'casino', 'slots' keywords."

# ----- Key insights for pipeline -----
insights:
  - label: "Subdomain-per-app architecture"
    detail: >
      Malavida uses a unique structure: each app gets its own subdomain within
      a language subdomain (e.g., whatsapp.ru.malavida.com). This results in
      9,880 unique subdomains across 14 languages. This is very different from
      freesoft.net's folder-based approach.

  - label: "14 language versions detected"
    detail: >
      Languages: es (www), ru, en, fr, it, de, jp, br, ro, nl, dk, se, pl, pt.
      This is the most extensive multilingual coverage among analyzed competitors.

  - label: "RU filter bias in this dataset"
    detail: >
      The CSV uses RU country filter, so ru.malavida.com shows 96% of traffic.
      Real global distribution would show es/en/fr/br as major languages
      (see overview_extra.top_countries: India 10.5%, Russia 8%, Brazil 6.2%,
      France 4.2%).

  - label: "Massive scale"
    detail: >
      14,296 entries for Russian alone suggests malavida has thousands of app
      pages per language. Total organic keywords globally: 54.1K (per overview).
      DR 73 with 13.9K referring domains.

  - label: "Infrastructure subdomains"
    detail: >
      5,779 entries are infrastructure (dw* download servers, imag CDN).
      These have 0 organic traffic as expected.
