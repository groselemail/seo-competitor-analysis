# ----- CSV data context -----
csv_note: >
  This CSV is an Ahrefs "Site Structure > Subdomains" export with RU (Russia)
  country filter. Traffic values reflect organic traffic FROM RUSSIA only, not
  global traffic. This explains why ru.malavida.com dominates (~96% of traffic
  in this dataset). Other language subdomains show near-zero RU traffic, which
  is expected — their real global traffic would be visible in country-specific
  exports.

csv_total_rows: 30000
csv_total_traffic_ru_filter: 1081200
csv_total_unique_subdomains: 9880

# ----- Language structure determination -----
language_structure: "subdomains"
structure_evidence:
  pattern: "{app-slug}.{lang-code}.malavida.com"
  examples:
    - "toca-life-world-mod.ru.malavida.com"
    - "whatsapp.ru.malavida.com"
    - "ayugram.ru.malavida.com/android"
    - "www.malavida.com"
  main_site: "www.malavida.com (Spanish — malavida is a Spanish company)"
  extraction: "awk -F'\\t' 'NR>1 {print $1}' file.csv | head -30"
  note: >
    Each app gets a dedicated subdomain per language. For example,
    WhatsApp in Russian is whatsapp.ru.malavida.com, in English it would be
    whatsapp.en.malavida.com. The language code is the second-level subdomain
    before malavida.com.

total_languages_detected: 14
top_languages: ["ru", "es", "en", "fr", "br", "it", "de", "jp", "ro", "nl", "dk", "se", "pl", "pt"]

