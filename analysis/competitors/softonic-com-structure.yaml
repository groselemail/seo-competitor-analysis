# ----- Language structure summary -----
language_structure: "subdomains"
language_structure_note: >
  softonic.com uses language subdomains: appname.LANG.softonic.com
  (e.g., minecraft.en.softonic.com, minecraft.fr.softonic.com).
  Spanish content is under root domain softonic.com (no language prefix)
  or www.softonic.com. Additionally, softonic.ru exists as a completely
  separate domain for Russian market (analyzed in task 05c).

total_languages_detected: 9
total_languages_note: "en, es (root/www), fr, de, it, vi, th, id, nl ‚Äî 8 language subdomains + 1 root (Spanish)"
top_languages: ["en", "es", "fr", "vi", "it", "de"]
top_languages_note: "Ordered by RU-filtered traffic. English dominates with 99.1% of traffic."

# ----- Key insight -----
key_insight: >
  Under RU filter, en.softonic.com captures 99.1% of all traffic (158,249 of 159,694).
  This is expected: Russian users predominantly visit English-language software pages.
  Non-English subdomains (fr, de, it, vi) show minimal RU traffic but have significant
  page counts (1,300-1,800 CSV rows each), indicating active content in those languages.
  Global traffic distribution would look very different ‚Äî the PNG shows India (43.2%),
  Bangladesh (4.8%), US (3.9%), France (1.6%) as top countries.

