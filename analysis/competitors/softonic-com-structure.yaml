  softonic.ru exists as a separate Russian domain (not a subdomain of softonic.com).
  It has its own site structure with 30,001 rows in a separate CSV file.
  Analyzed in task 05c (05c-parse-softonic-ru). Not included in this analysis.

# ----- Gambling filter -----
gambling_filtered:
  entries_removed: 483
  traffic_removed: 650
  share_of_total_traffic_pct: 0.41
  examples:
    - "rummy-cash-game-cash-rummy.en.softonic.com (traffic: 46)"
    - "1x-bet-sports-betting-app.en.softonic.com/android (traffic: 37)"
    - "rummy-palace-play-rummy-online-indian-card-game.en.softonic.com/android (traffic: 14)"
    - "glory-casino-app.en.softonic.com/android (traffic: 13)"
    - "betsson.en.softonic.com (traffic: 10)"
  regex: "(?i)(casino|gambling|slots|betting|bets|poker|roulette|jackpot|porn|xxx|adult|nsfw|–±—É–∫–º–µ–∫–µ—Ä|–∫–∞–∑–∏–Ω–æ|—Å—Ç–∞–≤–∫–∏|–ø–æ—Ä–Ω–æ|1xbet|juwa|rummy)"
  source: "softonic_com_site_structure_subdomains_ru_2026_03_05_22_48_04.csv"
  extraction: "awk -F'\\t' 'NR>1 && tolower($0) ~ /regex/' | wc -l"

