# ============================================================
# TRAFFIC BY LANGUAGE (FROM URL SUBDOMAINS)
# ============================================================
# Detection method: parse subdomain before .softonic.com,
#   last 2-letter segment = language code.
#   app-name.softonic.com (no lang segment) = "es" (Spanish, default).
#   en.softonic.com = "en", etc.
# Note: "xc" (1 page, 143 traffic) is likely an app subdomain false positive.
traffic_by_language_from_pages:
  source: "softonic_com_top_pages_subdomains_all_act_2026_03_05_23_04_55.csv"
  extraction: "awk parsing subdomain prefix from URL, last 2-char segment = lang"
  data:
    - { language: "en", pages_count: 19338, total_traffic: 29266262, pct_traffic: 77.0 }
    - { language: "es", pages_count: 4290, total_traffic: 5225159, pct_traffic: 13.7 }
    - { language: "fr", pages_count: 2505, total_traffic: 1755847, pct_traffic: 4.6 }
    - { language: "vi", pages_count: 1414, total_traffic: 1206387, pct_traffic: 3.2 }
    - { language: "it", pages_count: 958, total_traffic: 284580, pct_traffic: 0.7 }
    - { language: "de", pages_count: 944, total_traffic: 278737, pct_traffic: 0.7 }
    - { language: "xc", pages_count: 1, total_traffic: 143, pct_traffic: 0.0, note: "likely app subdomain false positive (xc.softonic.com)" }
  summary: |
    English dominates with 77% of traffic from 65.7% of pages.
    Spanish is 2nd with 13.7% traffic from 14.6% of pages.
    French is 3rd with 4.6% traffic from 8.5% of pages.
    Vietnamese is 4th with 3.2% traffic, notable emerging market.
    Italian and German each ~0.7% traffic.
    6 real languages detected (excluding xc false positive).

