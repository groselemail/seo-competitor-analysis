# ============================================================
# TRAFFIC BY PAGE TYPE
# ============================================================
# Classification logic:
#   - catalog_page: host is 2-letter lang code (en.softonic.com, fr.softonic.com, etc.)
#   - app_download: app subdomain + path contains /android, /download, /iphone, /mac, /chrome, /descargar, etc.
#   - app_main: app subdomain + root path (app homepage)
#   - app_versions: app subdomain + /versions path
#   - app_alternatives: app subdomain + /alternatives path
traffic_by_page_type:
  source: "softonic_com_top_pages_subdomains_all_act_2026_03_05_23_04_55.csv"
  extraction: "awk host/path classification, sum traffic per type"
  data:
    app_download:
      count: 20169
      total_traffic: 27242105
      pct_of_total_traffic: 71.7
    app_main:
      count: 7164
      total_traffic: 8895124
      pct_of_total_traffic: 23.4
    app_versions:
      count: 287
      total_traffic: 708776
      pct_of_total_traffic: 1.9
    catalog_page:
      count: 1092
      total_traffic: 673865
      pct_of_total_traffic: 1.8
    app_alternatives:
      count: 738
      total_traffic: 497245
      pct_of_total_traffic: 1.3
  summary: "App pages (download+main+versions) = 97.0% of traffic. Catalog/listing = 1.8%. Alternatives = 1.3%."

  url_patterns_detected:
    - { pattern: "/android", count: 17922, traffic: 25963104 }
    - { pattern: "/" (root), count: 6774, traffic: 8738021 }
    - { pattern: "/download", count: 920, traffic: 1344573 }
