    impact: "Traffic share percentages for non-RU languages are artificially suppressed"
    mitigation: "Used overview PNG data for global perspective where available"

  - note: "uptodown.com DR not available — PNG file missing during brief extraction"
    impact: "Cannot calculate true average DR for subdomain approach"
    mitigation: "Used softonic.com + malavida only for avg DR calculation"

  - note: "filehippo reclassified from 'single-language' to 'folders'"
    impact: "Changed initial assumption — filehippo is NOT a single-language control case"
    detail: "Brief 07a discovered 8 language folders that initial task design didn't expect"

  - note: "CSV totals may differ from overview PNG totals"
    impact: "Minor discrepancies in traffic figures"
    detail: "e.g., filehippo overview shows 526, CSV sums to 1,395. Overview is authoritative."
