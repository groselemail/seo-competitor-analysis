key_findings:
  - finding: "The French software download market is large: ~1.65M monthly FR traffic across 4 major players"
    evidence: "Sum of France traffic: 01net 823K (08b-01net.yaml) + clubic 635K (08a-clubic.yaml) + ccm 178K (08c-commentcamarche.yaml) + frees0ft 12.7K (03-freesoft-fr.yaml)"

  - finding: "The market is in decline — two major players have lost 1.75M French traffic combined"
    evidence: "01net France -1.4M (08b-01net.yaml decline section), commentcamarche est. -346K France (08c-commentcamarche.yaml decline section)"

  - finding: "Software download pages are the dominant traffic driver in the FR market (46-80% of traffic)"
    evidence: "clubic: 80% from downloads (08a-clubic.yaml), 01net: 46.5% from downloads (08b-01net.yaml). Download pages have the highest and most consistent traffic."

  - finding: "frees0ft.fr is the only growing player (15x FR traffic in 2 years) but starts from a tiny base (0.77% market share)"
    evidence: "FR daily traffic grew from 567 to 8,521 avg (03-freesoft-fr.yaml performance_fr section). But total FR traffic is only 12,700 vs 823K for leader."

  - finding: "frees0ft.fr has extreme single-product dependency — null's brawl drives ~90% of all traffic"
    evidence: "Top page (nulls-brawl/versions) = 10,854 traffic out of 13,989 total (03-freesoft-fr.yaml top_pages). Risk of total traffic collapse if this product loses popularity."

  - finding: "Messaging apps are traffic monsters in the FR download market (GBWhatsApp alone = 134K on clubic)"
    evidence: "clubic messaging: 21 pages, 225K traffic, 10,746 avg/page (08a-clubic.yaml). 01net WhatsApp pages: 25K + 20K + 8.6K + 8.3K (08b-01net.yaml top_pages)."

  - finding: "The DR gap (23 vs 80-81) is frees0ft.fr's primary competitive barrier"
    evidence: "frees0ft.fr DR=23 (03-freesoft-fr.yaml), clubic DR=81 (08a-clubic.yaml), 01net DR=81 (08b-01net.yaml), ccm DR=80 (08c-commentcamarche.yaml)"

  - finding: "Francophone Africa is a significant secondary market for French download content"
    evidence: "01net: Algeria 99K, Morocco 72K, Congo 49K, Senegal 38K = ~258K from Africa (08b-01net.yaml). frees0ft.fr gets 28.3% from Senegal alone (03-freesoft-fr.yaml)."

  - finding: "French URL conventions use 'telecharger' as the key download term, not 'download'"
    evidence: "Both clubic (/telecharger-fiche/) and 01net (/telecharger/) use French naming. Top keyword for download indexes is 'telecharger' (08a-clubic.yaml, 08b-01net.yaml)."

  - finding: "How-to/tutorial content paired with downloads performs well in the FR market"
    evidence: "commentcamarche applis_sites: 778 pages, 67K traffic, 86.2 avg/page (08c-commentcamarche.yaml). 01net tips: 2,321 pages, 47.7K traffic (08b-01net.yaml)."

