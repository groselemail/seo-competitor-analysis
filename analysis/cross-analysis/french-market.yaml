recommendations:
  - priority: 1
    action: "Diversify away from null's brawl dependency immediately"
    reasoning: >
      90% traffic concentration on one game mod is catastrophic risk.
      Create French download pages for top-demand apps: WhatsApp, ChatGPT,
      YouTube, Play Store, TikTok, VLC — apps that have stable, persistent demand.
    evidence: "03-freesoft-fr.yaml shows nulls-brawl = 10,854 of 13,989 traffic"

  - priority: 2
    action: "Target declining competitor keywords — especially 01net's lost positions"
    reasoning: >
      01net lost 1.4M French traffic and 765K French keywords.
