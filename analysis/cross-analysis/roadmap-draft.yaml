# PURPOSE: Actionable phased roadmap for freesoft's multilingual expansion
# combining language priorities (brief 16) with domain strategy (brief 17).
#
# KEY PRINCIPLE: Protect freesoft.ru (168K traffic) at all costs.
# Expand via *.freesoft.net subdomains (Option D — Hybrid).
# ==============================================================================

executive_summary:
  total_languages_to_add: 5
  existing_languages_to_optimize: ["en", "ru", "fr"]
  new_languages: ["es", "ar", "br", "id", "vi"]
  estimated_total_traffic_gain: 660563
  estimated_total_traffic_gain_source: "briefs/16-language-potential.yaml (summary.total_estimated_traffic_gain_all_languages)"
  current_total_traffic: 221827
  current_total_traffic_source: "briefs/16-language-potential.yaml (summary.current_total_traffic)"
  potential_total_traffic: 882390
  potential_total_traffic_source: "briefs/16-language-potential.yaml (summary.potential_total_with_all_languages)"
  growth_multiplier: "~4.0x"
  recommended_domain_strategy: "Option D — Hybrid: keep freesoft.ru, consolidate everything else on freesoft.net subdomains"
  domain_strategy_source: "briefs/17-domain-strategy.yaml (recommendation.chosen_option)"
  overall_timeline: "12 months (3 phases) + optional Phase 4 at month 12-18"
  confidence: "medium"
  key_message: >
    freesoft can grow from 222K to 500K-880K organic traffic within 12 months by
    optimizing 3 existing languages and adding 5 new ones via *.freesoft.net subdomains.
