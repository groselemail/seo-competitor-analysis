    168K Russian traffic while enabling scalable multilingual growth. Phase 1 requires
    zero migration risk and validates the approach before larger investment.
  source: "briefs/16-language-potential.yaml + briefs/17-domain-strategy.yaml"

# ==============================================================================
# PHASED ROLLOUT
# ==============================================================================

phased_rollout:

  # --------------------------------------------------------------------------
  # PHASE 1: QUICK WINS — Optimize Existing (Month 1-3)
  # --------------------------------------------------------------------------
  - phase: 1
    name: "Quick Wins — Optimize Existing"
    timeline: "Month 1-3"
    description: >
      Zero-risk actions on existing domains. Optimize EN/RU/FR content,
      set up cross-domain hreflang, prepare DNS infrastructure for expansion.
      Aligns with brief 17 migration_plan.phase_1.
    languages:
      - language: "en"
        current_domain: "freesoft.net"
        current_traffic: 32252
        current_traffic_source: "briefs/16-language-potential.yaml (languages[0].current_freesoft_traffic)"
        action: >
          Optimize existing English content on freesoft.net. The DR 51 domain
          has 191K backlinks but only 32K traffic — the largest DR-to-traffic gap
          across all 3 domains. Focus on high-impression, low-CTR pages.
          Add new app pages for high-demand categories (VPN, games, antivirus).
        action_source: "briefs/16-language-potential.yaml (languages[0].achievable_share.reasoning)"
        estimated_pages_to_optimize: 500
        estimated_new_pages: 200

      - language: "ru"
        current_domain: "freesoft.ru"
        current_traffic: 168000
        current_traffic_source: "briefs/16-language-potential.yaml (languages[4].current_freesoft_traffic)"
        action: >
          Optimize existing Russian content on freesoft.ru. Capture softonic.ru
          decline traffic (softonic.ru lost -578K). Optimize Windows content
          (2,609 pages generating only 5.7% of traffic). Diversify beyond
          TikTok Mod dependency (26.3% of traffic from one app).
        action_source: "briefs/16-language-potential.yaml (languages[4].growth_potential_on_existing)"
        estimated_pages_to_optimize: 1000
        estimated_new_pages: 300

      - language: "fr"
        current_domain: "frees0ft.fr"
        current_traffic: 21575
        current_traffic_source: "briefs/16-language-potential.yaml (languages[2].current_freesoft_traffic)"
        action: >
          Optimize existing French content on frees0ft.fr. Target keywords lost
          by declining competitors (01net lost -1.4M FR traffic, commentcamarche
          lost -346K FR traffic). Prepare content for migration to fr.freesoft.net
          in Phase 2. Add new app pages targeting long-tail French keywords.
        action_source: "briefs/16-language-potential.yaml (languages[2].achievable_share.detailed_estimate)"
        estimated_pages_to_optimize: 300
        estimated_new_pages: 200

    domain_actions:
      - action: "Implement cross-domain hreflang between freesoft.ru ↔ freesoft.net"
        detail: >
          Add hreflang tags via XML sitemaps linking Russian pages on freesoft.ru
          to their English equivalents on freesoft.net (and vice versa).
        source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_1.actions[0])"
      - action: "Set up DNS infrastructure for *.freesoft.net subdomains"
        detail: >
          Configure wildcard DNS or specific subdomain records for future language
          subdomains (fr, es, ar, pt, id, vi). No content changes yet — infrastructure only.
        source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_1.actions[1])"
      - action: "Set up Google Search Console properties for planned subdomains"
        detail: >
          Pre-register fr.freesoft.net, es.freesoft.net, ar.freesoft.net, pt.freesoft.net,
          id.freesoft.net, vi.freesoft.net in GSC to ensure indexing is tracked from day one.

    expected_traffic_gain:
      value: 18700
      range: "0-18,700"
      note: >
        Phase 1 is primarily setup and optimization. Traffic impact from content
        optimization typically takes 2-3 months to materialize. The 18.7K estimate
        represents the beginning of EN/RU/FR optimization effects.
      calculation: >
        EN optimization early effects: ~5,000 (partial of 132K total estimate)
        RU softonic.ru capture early effects: ~10,000 (partial of 55K total estimate)
        FR optimization early effects: ~3,700 (partial of 65K total estimate)
      source: "briefs/16-language-potential.yaml (estimated_additional_traffic per language, prorated for 3 months)"

    kpis:
      - metric: "EN organic traffic (freesoft.net)"
        current: 32252
        target: 37000
        measurement_timeline: "3 months"
        source: "briefs/16-language-potential.yaml (languages[0].current_freesoft_traffic)"
      - metric: "RU organic traffic (freesoft.ru)"
        current: 168000
        target: 178000
        measurement_timeline: "3 months"
        source: "briefs/16-language-potential.yaml (languages[4].current_freesoft_traffic)"
      - metric: "FR organic traffic (frees0ft.fr)"
        current: 21575
        target: 25000
        measurement_timeline: "3 months"
        source: "briefs/16-language-potential.yaml (languages[2].current_freesoft_traffic)"
      - metric: "Cross-domain hreflang implementation"
        current: 0
        target: "100% of matching RU/EN pages tagged"
        measurement_timeline: "2 months"
      - metric: "DNS infrastructure for *.freesoft.net"
        current: "not configured"
        target: "6 subdomains resolving (fr, es, ar, pt, id, vi)"
        measurement_timeline: "1 month"

    risks:
      - "Content optimization may not show results within 3 months (SEO lag)"
      - "Hreflang implementation errors could temporarily confuse search engines"
      - "freesoft.ru TikTok Mod dependency: if that page loses traffic, RU baseline drops"
    dependencies:
      - "Access to Google Search Console for all 3 domains"
      - "Ability to modify HTML/sitemaps on all 3 domains"
      - "Content team capacity for optimization (1,800 pages to optimize + 700 new pages)"

  # --------------------------------------------------------------------------
  # PHASE 2: PRIMARY EXPANSION (Month 3-6)
  # --------------------------------------------------------------------------
  - phase: 2
    name: "Primary Expansion — French Migration + Top 2 New Languages"
    timeline: "Month 3-6"
    description: >
      Migrate frees0ft.fr to fr.freesoft.net (fixes spelling issue, low risk).
      Launch Spanish and Arabic — the #1 and #3 priority new languages.
      Aligns with brief 17 migration_plan.phase_2 + phase_3 start.
    languages:
      - language: "fr"
        action: "Migrate frees0ft.fr → fr.freesoft.net"
        current_traffic: 21575
        migration_risk: "low"
        migration_risk_reasoning: >
          frees0ft.fr has DR 23 and only 24 followed referring domains.
          Spelling issue (zero vs 'o') means domain brand is already compromised.
          Even a 50% traffic loss = ~11K visits, recoverable in 3-6 months
          as fr.freesoft.net benefits from freesoft.net's DR 51.
        migration_risk_source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_2.actions[0].risk_assessment)"
        redirect_plan:
          - "Deploy identical content on fr.freesoft.net"
          - "Implement page-by-page 301 redirects from frees0ft.fr to fr.freesoft.net"
          - "Update GSC — add fr.freesoft.net property"
          - "Monitor fr.freesoft.net indexing for 2-4 weeks"
          - "After 12 months, consider discontinuing frees0ft.fr domain renewal"
        redirect_plan_source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_2.actions[0].redirect_plan)"
        estimated_pages: 500
        estimated_new_pages: 500
        note: "Add 500 new French app pages to fr.freesoft.net targeting declining competitor keywords"

      - language: "es"
        action: "Launch es.freesoft.net — Spanish (new language, #1 priority)"
        current_traffic: 0
        estimated_additional_traffic: 134002
        estimated_additional_traffic_source: "briefs/16-language-potential.yaml (languages[1].estimated_additional_traffic)"
        tam: 9926039
        tam_source: "briefs/16-language-potential.yaml (languages[1].tam)"
        achievable_share_pct: 1.5
        confidence: "medium"
        initial_pages: 1000
        content_approach: >
          Machine translation of top 1,000 English app pages + human review for
          quality. Focus on highest-traffic apps from competitors (WhatsApp, TikTok,
          Minecraft, PUBG, etc.). Spanish is linguistically close to Portuguese,
          enabling shared content infrastructure.
        note: >
          All 3 competitors are Spanish-origin companies with deep native content.
          Entry requires high-quality localization to compete. Start with 1,000 pages
          and scale based on indexing/traffic signals.

      - language: "ar"
        action: "Launch ar.freesoft.net — Arabic (new language, #3 priority)"
        current_traffic: 0
        estimated_additional_traffic: 93520
        estimated_additional_traffic_source: "briefs/16-language-potential.yaml (languages[3].estimated_additional_traffic)"
        tam: 3463699
        tam_source: "briefs/16-language-potential.yaml (languages[3].tam)"
        achievable_share_pct: 3.0
        confidence: "medium"
        initial_pages: 500
        content_approach: >
          Machine translation + professional Arabic review (RTL accuracy critical).
          Focus on MENA-popular apps. Requires RTL CSS/layout infrastructure investment.
          Start with 500 pages — smaller initial batch due to RTL complexity.
        note: >
          Only uptodown serves Arabic (3.5M traffic). Softonic and malavida are absent.
          Lowest competition of any major language. High potential but high entry cost
          due to RTL infrastructure.

    domain_actions:
      - action: "Complete frees0ft.fr → fr.freesoft.net migration with 301 redirects"
        source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_2.actions[0])"
      - action: "Launch es.freesoft.net with initial 1,000 Spanish app pages"
        source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_2.actions[1])"
      - action: "Launch ar.freesoft.net with initial 500 Arabic app pages"
        source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_3.actions[0])"
      - action: "Extend hreflang to include fr.freesoft.net + es.freesoft.net + ar.freesoft.net"
        source: "briefs/17-domain-strategy.yaml (hreflang_plan.phase_2_hreflang + phase_3_hreflang)"

    expected_traffic_gain:
      value: 75000
      range: "40,000-110,000"
      calculation: >
        FR migration recovery: ~20K (maintained from frees0ft.fr via redirects)
        ES initial indexing (3 months in): 10K-30K (early fraction of 134K estimate)
        AR initial indexing (3 months in): 5K-20K (early fraction of 94K estimate)
        EN continued optimization: +20K-30K (cumulative from Phase 1)
        RU continued optimization: +10K-20K (cumulative from Phase 1)
      source: "briefs/16-language-potential.yaml + briefs/17-domain-strategy.yaml (estimated_traffic_impact.medium_term)"

    kpis:
