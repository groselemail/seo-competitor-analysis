# ==============================================================================
# PAGE TEMPLATES
# ==============================================================================

page_templates:
  - template: "app_download_page"
    description: "Individual software/app download page — core content type"
    elements:
      - "Title (localized app name + localized keywords, e.g., 'Скачать WhatsApp' / 'Descargar WhatsApp')"
      - "Meta description (localized, 150-160 chars, includes primary keyword)"
      - "H1 heading (localized app name + action keyword)"
      - "Description (localized, 150-300 words — app overview, features, what's new)"
      - "Screenshots (universal images, captions/alt text localized)"
      - "Download button/link (universal URL, button text localized)"
      - "Version info, size, requirements (universal data, labels localized)"
      - "User reviews section (localized if available, or structured placeholder)"
      - "Related/similar apps section (localized app names and descriptions)"
      - "FAQ section (localized common questions — 'Is [app] safe?', 'How to install?')"
      - "Breadcrumb navigation (localized category names)"
      - "Schema markup (SoftwareApplication — language-appropriate)"
    localization_effort: "medium"
    localization_detail: >
      Title, description, and FAQ require natural-sounding localization (not literal translation).
      Screenshots, download links, and version info are universal. Reviews can start as
      placeholder templates, filled over time. Schema markup structure is identical across
      languages, only text values change.
    priority: "highest"
    pages_per_language_estimate: 30000
    initial_rollout_per_language: "500-1000 (top apps by competitor traffic)"
    note: >
      This is freesoft's core page type — 80%+ of traffic comes from these pages.
      Competitor data confirms: uptodown 94.7%, softonic 97.0%, malavida 98.6%
      of traffic from app/download pages.
    note_source: "briefs/16-language-potential.yaml (methodology.relevance_factor_methodology)"

  - template: "category_listing_page"
    description: "Category/collection page listing apps (e.g., 'VPN Apps', 'Photo Editors')"
    elements:
      - "Category name (localized)"
      - "Category description (localized, 100-200 words, includes target keywords)"
      - "Category H1 (localized with search intent)"
      - "App grid/list with thumbnails (universal images, localized app names and short descriptions)"
      - "Filters and sorting UI (localized labels)"
      - "Pagination (universal)"
      - "Schema markup (CollectionPage or ItemList)"
      - "Internal links to related categories (localized)"
    localization_effort: "low"
    localization_detail: >
      Category names and descriptions need localization. App thumbnails are universal.
      Filter/sort UI is template-based (translate once, reuse everywhere).
      The bulk of the page content (app entries) is auto-generated from app_download_page data.
    priority: "high"
    pages_per_language_estimate: 50
    initial_rollout_per_language: 50
    note: "Categories serve as hub pages for internal linking and topic authority signals."

  - template: "homepage"
    description: "Language-specific homepage for each subdomain"
    elements:
      - "Hero section (localized headline, subheadline, CTA)"
      - "Top/trending apps section (region-specific selection based on local popularity)"
      - "Category navigation grid (localized category names with icons)"
      - "Search box (localized placeholder text)"
      - "Recently updated apps (universal data, localized labels)"
      - "Trust signals (download count, user count — universal numbers, localized labels)"
    localization_effort: "medium"
    localization_detail: >
      Hero text and category navigation require creative localization.
      Top/trending apps should be customized per region (MENA apps for Arabic,
      LATAM apps for Spanish, SEA apps for Indonesian/Vietnamese).
    priority: "high"
    pages_per_language_estimate: 1
    initial_rollout_per_language: 1

  - template: "static_pages"
    description: "About, Contact, Privacy Policy, Terms — required for each language version"
    elements:
      - "Page content (localized)"
      - "Legal compliance (localized for target region)"
      - "Contact information (universal)"
    localization_effort: "low"
    priority: "medium"
    pages_per_language_estimate: 5
    initial_rollout_per_language: 5
    note: "Required for Google's quality guidelines. Minimal SEO impact but builds trust."

# ==============================================================================
# KPI FRAMEWORK
# ==============================================================================

kpi_framework:
  leading_indicators:
    - metric: "Indexed pages per language"
      measurement: "Google Search Console — Index Coverage report"
      frequency: "weekly"
      why: >
        Measures content availability before traffic appears. If pages aren't indexed,
        they can't rank. Target 80%+ indexation rate within 4 weeks of publication.
      targets:
        phase_1: "Existing pages remain indexed (no deindexing from hreflang changes)"
        phase_2: "800+ ES pages, 400+ AR pages indexed within 3 months"
        phase_3: "500K+ total indexed pages across all languages"

    - metric: "Average position for target keywords per language"
      measurement: "Google Search Console — Performance report, filtered by language/country"
      frequency: "weekly"
      why: >
        Early signal of ranking potential. New pages typically appear at positions
        50-100 within weeks, then climb. Movement from 50+ to 20-30 within 2 months
        indicates the content is competitive.
      targets:
        phase_2: "ES/AR target keywords average position < 30 within 3 months"
        phase_3: "All new languages average position < 25 within 6 months of launch"

    - metric: "Crawl rate per language section"
      measurement: "Google Search Console — Crawl Stats report"
      frequency: "weekly"
      why: >
        Ensures Google is discovering new content. Healthy crawl rate = Google considers
        the content worth visiting frequently. Low crawl rate = potential quality or
        technical issues.
      targets:
        phase_2: "New subdomains crawled daily within 2 weeks of sitemap submission"
        phase_3: "All language sections crawled at least daily"

    - metric: "Hreflang coverage and error rate"
      measurement: "Google Search Console — International Targeting report + Screaming Frog audit"
      frequency: "bi-weekly"
      why: >
        Cross-domain hreflang (freesoft.ru ↔ *.freesoft.net) is technically complex.
        Errors cause incorrect language serving or indexing issues. Must monitor closely.
      targets:
        phase_1: "Zero hreflang errors between freesoft.ru ↔ freesoft.net"
        phase_2: "< 5% hreflang error rate across all language pairs"

    - metric: "Content publication velocity"
      measurement: "Internal CMS/deployment tracking"
      frequency: "weekly"
      why: >
        Tracks whether the content pipeline is delivering at planned pace.
        Falling behind on content velocity delays traffic gains proportionally.
      targets:
        phase_2: "1,500 new pages published (1,000 ES + 500 AR) within 3 months"
        phase_3: "2,000+ new pages published across PT/ID/VI within 6 months"

  lagging_indicators:
    - metric: "Organic traffic per language"
      measurement: "Google Analytics + Google Search Console"
      frequency: "monthly"
      why: "Primary success metric. Measures actual user visits from organic search per language."
      targets:
        phase_1: "EN 37K, RU 178K, FR 25K (3 months)"
        phase_2: "ES 15K, AR 10K, FR 20K on fr.freesoft.net (6 months)"
        phase_3: "Total portfolio 500K+ (12 months)"
      source: "briefs/16-language-potential.yaml (per-language estimated_additional_traffic)"

    - metric: "Downloads per language"
      measurement: "Internal analytics — download button clicks per language section"
      frequency: "monthly"
      why: >
        Business outcome metric. Traffic without downloads means wrong audience
        or poor page quality. Target download-to-visit ratio of 15-30%
        (typical for software download sites).
      targets:
        phase_2: "ES/AR download-to-visit ratio > 15% within 3 months of launch"
        phase_3: "All languages download-to-visit ratio > 20%"

    - metric: "Keyword count per language"
      measurement: "Ahrefs — Organic Keywords report per subdomain"
      frequency: "monthly"
      why: >
        Measures SEO footprint growth. More keywords = more entry points for organic
        traffic. Healthy growth = keywords increasing faster than pages (indicating
        existing pages ranking for multiple queries).
      targets:
        phase_2: "ES 2,000+ keywords, AR 1,000+ keywords within 6 months"
        phase_3: "Total portfolio 50,000+ keywords within 12 months"

    - metric: "Domain Rating (freesoft.net)"
      measurement: "Ahrefs — Domain Rating"
      frequency: "monthly"
      why: >
        Tracks authority consolidation on freesoft.net. DR growth from multilingual
        expansion signals to search engines that the domain is authoritative across
        markets. Key threshold: DR > 59 (freesoft.ru level) enables optional Phase 4.
      targets:
        phase_2: "DR 54+ (from 51)"
        phase_3: "DR 58+ (approaching freesoft.ru's 59)"
      source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_4_optional.conditions_required[0])"

    - metric: "Revenue per language (if tracked)"
      measurement: "Ad revenue / affiliate revenue per language section"
      frequency: "monthly"
      why: >
        Ultimate business metric. Different markets have different CPMs and affiliate
        rates. Revenue per visit may vary significantly by language/region.

# ==============================================================================
# RESOURCE REQUIREMENTS
# ==============================================================================

resources:
  content:
    total_new_pages_year_1: 9006
    pages_per_language_breakdown:
      - language: "en"
        type: "optimize existing + new"
        optimize: 500
        new: 200
        note: "Optimization of existing freesoft.net pages + new high-demand app pages"
      - language: "ru"
        type: "optimize existing + new"
        optimize: 1000
        new: 300
        note: "Windows content optimization + mod diversification + new app pages"
      - language: "fr"
        type: "optimize + migrate + new"
        optimize: 300
        new: 700
        note: "300 optimized + 200 new on frees0ft.fr (Phase 1) + 500 new on fr.freesoft.net (Phase 2)"
      - language: "es"
        type: "new"
        initial: 1000
        scale_to: 3000
        note: "1,000 initial (Phase 2), scale to 3,000 in Phase 3 based on results"
      - language: "ar"
        type: "new"
        initial: 500
        scale_to: 2000
        note: "500 initial (Phase 2), scale to 2,000 in Phase 3. RTL infrastructure required."
      - language: "br"
        type: "new"
        initial: 1000
        note: "Leverage Spanish content pipeline (linguistic similarity)"
      - language: "id"
        type: "new"
        initial: 500
        note: "Mobile-first content focus. Bundle with Vietnamese pipeline."
      - language: "vi"
        type: "new"
        initial: 500
        note: "Bundle with Indonesian content pipeline (regional proximity)"
      - language: "batch (it, de, th, tr, etc.)"
        type: "automated"
        pages_per_language: 200
        languages: 9
        total: 1800
        note: "Only if automated pipeline operational and Phase 2 validates approach"
        condition: "contingent on Phase 2 success"

    content_approach:
      primary_method: "Machine translation (LLM-based) + human review"
      detail: >
        For 30,000+ app pages per language, professional human translation is impractical
        (cost: ~$0.10-0.15/word × 200 words/page × 30,000 pages = $600K-900K per language).
        Recommended approach:
        1. Top 100 pages per language: Professional localization (highest traffic pages)
        2. Top 1,000 pages per language: LLM translation + native speaker review
        3. Remaining pages: LLM translation with automated quality checks
        4. Ongoing: User feedback loop for translation corrections
      cost_estimate_per_language:
        top_100_professional: "$10,000-15,000"
        top_1000_llm_plus_review: "$5,000-10,000"
        remaining_automated: "$500-2,000 (API costs only)"
        total_initial: "$15,000-27,000 per language"
      source: "Industry standard translation costs; freesoft page length estimated from brief 11"

  technical:
    infrastructure_changes:
      - change: "DNS: Wildcard or individual subdomain records for *.freesoft.net"
        timeline: "Phase 1, Month 1"
        effort: "low"
      - change: "SSL: Wildcard certificate for *.freesoft.net"
        timeline: "Phase 1, Month 1"
        effort: "low"
      - change: "Server: Subdomain routing + content serving infrastructure"
        timeline: "Phase 1, Month 1-2"
        effort: "medium"
      - change: "RTL support: CSS/layout changes for Arabic subdomain"
        timeline: "Phase 2, Month 3-4"
        effort: "medium-high"
      - change: "301 redirect infrastructure: frees0ft.fr → fr.freesoft.net page-by-page mapping"
        timeline: "Phase 2, Month 3"
        effort: "medium"
        source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_2.actions[0].redirect_plan)"
      - change: "Content pipeline: Automated translation + deployment system"
        timeline: "Phase 1-2, Month 1-4"
        effort: "high"
        note: "Critical infrastructure — must be operational before Phase 2 language launches"
      - change: "Hreflang sitemap automation: Generate cross-domain hreflang sitemaps"
        timeline: "Phase 1-3, iterative"
        effort: "medium"
        source: "briefs/17-domain-strategy.yaml (hreflang_plan)"

    hreflang_setup: >
      Cross-domain hreflang via XML sitemaps (most reliable for cross-domain setup).
      Phase 1: freesoft.ru ↔ freesoft.net (2 languages).
      Phase 2: Add fr.freesoft.net + es.freesoft.net + ar.freesoft.net (5 languages).
      Phase 3: Add pt/id/vi.freesoft.net (8 languages).
      Must be automated — manual maintenance of hreflang across 30K+ pages × 8 languages
      is impractical. Each page needs bidirectional links to all 7 other language versions.
    hreflang_source: "briefs/17-domain-strategy.yaml (hreflang_plan)"

    search_console_setup: >
      One GSC property per subdomain + one for freesoft.ru.
      Total properties: freesoft.net, freesoft.ru, fr.freesoft.net, es.freesoft.net,
      ar.freesoft.net, pt.freesoft.net, id.freesoft.net, vi.freesoft.net = 8 properties.
      Use Domain property for freesoft.net to capture all subdomains in aggregate.

    sitemap: >
      One XML sitemap per language section. Each sitemap includes:
      1. Standard sitemap with all pages in that language
      2. Hreflang sitemap with cross-language alternate links
      Submit all sitemaps to respective GSC properties.
      Automate sitemap generation and submission.

  seo:
    - "Hreflang tag implementation across all languages via XML sitemaps"
    - "Sitemap creation and submission per language section"
    - "GSC property setup per language (8 properties total)"
    - "International targeting configuration in GSC (where applicable)"
    - "Monthly hreflang audit via Screaming Frog or Sitebulb"
    - "Keyword research per language — identify top 100 target keywords per market"
    - "Competitor monitoring: track uptodown/softonic/malavida traffic per language monthly"
    - "Link building strategy for freesoft.net (target DR 58+ within 12 months)"

  team:
    required_roles:
      - role: "Technical lead / developer"
        effort: "60-80% for months 1-4, then 20-40% ongoing"
        tasks: "DNS, SSL, subdomain routing, RTL support, content pipeline, hreflang automation"
      - role: "SEO specialist"
        effort: "40-60% ongoing"
        tasks: "Keyword research, hreflang audit, GSC monitoring, competitor tracking"
      - role: "Content manager"
        effort: "20-40% Phase 1, 80-100% Phase 2-3"
        tasks: "Translation quality review, content pipeline management, regional app selection"
      - role: "Native language reviewers (per language)"
        effort: "Part-time, 10-20 hours/month per language during content creation phase"
        tasks: "Review machine translations for accuracy and naturalness"

  timeline_total: "12 months for Phases 1-3 + optional Phase 4 evaluation at month 12-18"

# ==============================================================================
# RISK REGISTER
# ==============================================================================

risks:
  - risk: "frees0ft.fr → fr.freesoft.net migration causes prolonged traffic drop"
    probability: "medium"
    impact: "low"
    impact_detail: "21.6K traffic at risk, mostly from single page (null's brawl)"
    mitigation:
      - "Page-by-page 301 redirects (not domain-level wildcard)"
      - "Deploy identical content on fr.freesoft.net BEFORE enabling redirects"
      - "Monitor GSC indexing weekly for 4 weeks"
      - "Keep frees0ft.fr domain with redirects active for 12+ months"
      - "If traffic drops >30% after 2 months, add more content to fr.freesoft.net"
    source: "briefs/17-domain-strategy.yaml (risk_mitigation[0])"

  - risk: "freesoft.ru traffic declines following softonic.ru / trashbox.ru pattern"
    probability: "medium"
    impact: "high"
    impact_detail: "168K traffic at stake — 75.6% of current portfolio"
    mitigation:
      - "Active content optimization per brief 16 (Windows content, mod diversification)"
      - "Monitor monthly: if traffic drops 20%+ over 3 months, accelerate Phase 4 evaluation"
      - "Capture softonic.ru's declining traffic proactively (target same keywords)"
      - "If freesoft.ru DR drops below freesoft.net DR, consider full consolidation"
    source: "briefs/17-domain-strategy.yaml (risk_mitigation[1])"

  - risk: "New language subdomains fail to gain traction (filehippo scenario)"
    probability: "low-medium"
    impact: "medium"
    impact_detail: "Content investment without traffic return"
    mitigation:
      - "Launch with 500-1,000 pages per language — test before scaling"
      - "Focus on highest-demand apps first (apps that rank on competitor sites)"
      - "Quality over quantity: filehippo failed due to poor localization, not structure"
      - "Monitor per-language traffic monthly; pause languages with zero growth after 6 months"
    source: "briefs/17-domain-strategy.yaml (risk_mitigation[2])"

  - risk: "Low-quality machine translations hurt rankings and user trust"
    probability: "medium"
    impact: "medium"
    impact_detail: "Poor translations lead to high bounce rates and Google quality penalties"
    mitigation:
      - "Human review for all top-1,000 pages per language"
      - "Professional localization for top-100 pages per language"
      - "User feedback mechanism for translation errors"
      - "Quality sampling: spot-check 5% of automated translations monthly"
      - "Use LLM-based translation (higher quality than traditional MT) with domain-specific prompting"

  - risk: "Cross-domain hreflang (freesoft.ru ↔ *.freesoft.net) causes indexing issues"
    probability: "low"
    impact: "medium"
    mitigation:
      - "Implement via XML sitemaps (most reliable for cross-domain)"
      - "Validate with GSC International Targeting report"
      - "Test on 100 pages first before full rollout"
      - "Monthly audit with Screaming Frog"
    source: "briefs/17-domain-strategy.yaml (risk_mitigation[3])"

  - risk: "DR fragmentation between .ru and .net limits competitiveness vs DR 73-86 competitors"
    probability: "high"
    impact: "medium"
    impact_detail: >
      This is a certainty, not a risk. New language subdomains on freesoft.net compete
      at DR 51 against uptodown (DR 73), softonic (DR 86), malavida (DR 73).
    mitigation:
      - "Focus link building on freesoft.net to close DR gap"
      - "Target DR 58+ within 12 months"
      - "Each new language subdomain generates additional backlinks benefiting root domain"
      - "If freesoft.net DR exceeds freesoft.ru DR (59), evaluate full consolidation (Phase 4)"
    source: "briefs/17-domain-strategy.yaml (risk_mitigation[4])"

  - risk: "Arabic RTL infrastructure takes longer than planned"
    probability: "medium"
    impact: "low"
    impact_detail: "Delays ar.freesoft.net launch by 1-2 months"
    mitigation:
      - "Begin RTL CSS development in Phase 1 as infrastructure prep"
      - "Use existing RTL CSS frameworks (Bootstrap RTL, Tailwind RTL)"
      - "If RTL delays, launch ar.freesoft.net with basic layout and iterate"

  - risk: "Competitor traffic estimates from brief 16 are wrong"
    probability: "medium"
    impact: "medium"
    impact_detail: >
      Traffic estimates are based on Ahrefs data for competitors. Actual achievable
      traffic could be 50% lower or 200% higher than estimated.
    mitigation:
      - "Phase 1 validates estimates before larger investment"
      - "Use Phase 2 actual results to recalibrate Phase 3 targets"
      - "Abort criteria ensure investment stops if estimates are wildly off"
    source: "briefs/16-language-potential.yaml (assumptions)"

  - risk: "Resource constraints — small team cannot handle 8 languages simultaneously"
    probability: "medium"
    impact: "medium"
    impact_detail: "Phased rollout delayed, reducing first-year traffic gains"
    mitigation:
      - "Strict phasing: don't start Phase 3 until Phase 2 is operational"
      - "Automated content pipeline reduces per-language marginal effort"
      - "Native reviewers are part-time contractors, not full-time hires"
      - "If constrained, prioritize: ES > AR > BR > ID > VI"

  - risk: "Google algorithm update penalizes machine-translated content"
    probability: "low"
    impact: "high"
    impact_detail: "Could affect all new language sections simultaneously"
    mitigation:
      - "Use LLM-based translation (perceived as higher quality by Google)"
      - "Add unique value per page: localized reviews, region-specific recommendations"
      - "Human review for top pages ensures quality baseline"
      - "Monitor Google quality rater guidelines for translation-related updates"
      - "Diversify: ensure each language section has some original content"

# ==============================================================================
# SUCCESS CRITERIA
# ==============================================================================

success_criteria:
  phase_1_success:
    metric: "Combined EN+RU+FR traffic increases 8% within 3 months"
    current_baseline: 221827
    target: 240000
    source: "briefs/16-language-potential.yaml (summary.current_total_traffic)"
    validation: >
      Phase 1 is primarily setup and optimization. An 8% increase validates that
      content optimization moves the needle and existing domains have growth potential.

  phase_2_success:
    metric: "ES + AR subdomains generate 25,000 combined traffic within 6 months of launch"
    target: 25000
    source: >
      Conservative fraction of brief 16 estimates: ES 134K long-term → 15K in 6 months,
      AR 94K long-term → 10K in 6 months.
    validation: >
      New language subdomains showing organic growth confirms the expansion model works.
      25K combined is a realistic 6-month milestone for 2 new languages.

  phase_3_success:
    metric: "Total multilingual portfolio reaches 500,000 organic traffic within 12 months"
    current_baseline: 221827
    target: 500000
    growth_pct: "125%"
    source: "briefs/16-language-potential.yaml (summary.potential_total_with_all_languages — 60% achievement)"
    validation: >
      500K represents ~60% achievement of brief 16's full 882K estimate.
      This is the conservative scenario that accounts for execution gaps, slower
      indexing, and estimates being partially wrong.

  overall_success:
    metric: "Total multilingual traffic reaches 700,000+ within 18 months"
    target: 700000
    source: "briefs/16-language-potential.yaml (summary.potential_total_with_all_languages — 80% achievement)"
    validation: >
      700K represents ~80% of brief 16's full estimate. Achievable if Phase 1-2
      results are strong and Phase 3 languages gain traction.

  abort_criteria:
    phase_1_abort: >
      If Phase 1 shows zero traffic increase (or decline) after 3 months despite
      optimization efforts, re-evaluate content quality and approach before Phase 2.
      Do NOT launch new languages if existing language optimization fails.
    phase_2_abort: >
      If ES + AR subdomains generate < 5,000 combined traffic after 6 months,
      STOP Phase 3 expansion. Re-evaluate: content quality, localization approach,
      competitive positioning. 5K is the minimum viable signal that the subdomain
      model works for new languages.
    phase_2_abort_source: >
      5K threshold = ~2% of the combined 228K estimated potential for ES+AR.
      If freesoft can't capture even 2% after 6 months, the estimates or approach
      are fundamentally flawed.
    general_abort: >
      If freesoft.ru traffic drops > 30% (below 118K) at any point, PAUSE all
      expansion activity and focus resources on stabilizing the primary revenue source.
      freesoft.ru at 168K is 75.6% of the portfolio — its health overrides expansion goals.
    general_abort_source: "briefs/17-domain-strategy.yaml (key constraint: freesoft.ru's 168K traffic)"

# ==============================================================================
# OPTIONAL PHASE 4 (from brief 17)
# ==============================================================================

phase_4_optional:
  name: "Evaluate full consolidation of freesoft.ru → ru.freesoft.net"
  timeline: "Month 12-18 (ONLY if conditions are met)"
  conditions_required:
    - condition: "freesoft.net DR has grown past 59 (currently 51)"
      why: "Migration to a weaker domain is the primary risk. Only migrate when receiving domain is stronger."
    - condition: "*.freesoft.net subdomains are performing well"
      why: "Validates that the subdomain model works before adding the highest-stakes migration."
    - condition: "Russian market trajectory is clearly understood"
      why: "If .ru market is growing, consolidation has higher risk. If declining, lower risk."
    - condition: "Team has capacity for a major migration project"
      why: "168K traffic migration requires full team attention."
  source: "briefs/17-domain-strategy.yaml (recommendation.migration_plan.phase_4_optional)"
  default_if_unclear: "Do NOT consolidate. Keep hybrid model indefinitely."
  note: >
    Phase 4 is explicitly OPTIONAL. The hybrid model (freesoft.ru + *.freesoft.net)
    is a viable permanent structure. Only consolidate if the risk profile is favorable.
    softonic operates a similar hybrid (softonic.com + softonic.ru) — though softonic.ru
    is declining, this may be due to content stagnation, not the hybrid structure itself.

