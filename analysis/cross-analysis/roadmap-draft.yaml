      - metric: "RU organic traffic (freesoft.ru)"
        current: 168000
        target: 195000
        measurement_timeline: "6 months"
        source: "briefs/16-language-potential.yaml (languages[4].estimated_additional_traffic)"

    risks:
      - "frees0ft.fr → fr.freesoft.net migration may cause temporary FR traffic dip (20-50% for 1-3 months)"
