      - "Begin building automated translation pipeline"
  - month: 2
    actions:
      - "Continue content optimization across EN/RU/FR"
      - "Complete hreflang implementation for RU ↔ EN"
      - "RTL infrastructure development begins (for Arabic)"
      - "Translation pipeline MVP: test with 100 Spanish pages"
  - month: 3
    actions:
      - "Phase 1 results review — validate optimization approach"
      - "Begin frees0ft.fr → fr.freesoft.net migration"
      - "Deploy fr.freesoft.net with existing + new French content"
