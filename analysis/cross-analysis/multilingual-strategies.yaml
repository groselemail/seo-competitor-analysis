  languages_served_by_all_3: ["en", "es", "fr", "ru", "it", "de"]
  key_takeaway: >
    The software download niche is deeply multilingual, with 17+ languages generating measurable
    traffic. English is dominant (45.7M, 61% of total), but non-English languages collectively
    represent 29.5M traffic. French (4.3M) is the best expansion target for freesoft given the
    existing frees0ft.fr domain — all competitors validate this market. Arabic (3.5M) is the
    largest untapped opportunity with only 1 competitor present. Russian (3.1M, freesoft's core)
    is healthy but softonic.ru's decline signals opportunity to capture share. The universal
    pattern: subdomain architecture + app-focused content + Android-first = traffic. Category
