summary:
  total_languages_across_competitors: 22
  total_languages_note: >
    22 unique language codes detected: en, ar, es, br, id, ru, fr, vi, in, th, tr, kr,
    it, de, jp, cn, ro (from uptodown), nl, dk, se, pl, pt (additional from malavida structure).
    Not all have measurable traffic — some are structural only.
  languages_with_measurable_traffic: 17
  languages_with_measurable_traffic_note: "17 languages have traffic > 0 in ALL-locations pages data"
  most_common_strategy: "subdomains"
  most_common_strategy_note: "All 3 competitors use {app}.{lang}.domain.com subdomains. Only softonic also uses a separate .ru ccTLD."
  biggest_language_by_total_traffic: "en (45,693,472 combined across 3 competitors)"
  total_competitor_traffic_all_languages: 75217821
