# ==============================================================================
# PATTERNS
# ==============================================================================

patterns:
  - pattern: "English is the universal #1 language by traffic across all competitors"
    detail: >
      English captures 47.9% of uptodown traffic, 76.3% of softonic traffic, and 29.1% of
      malavida traffic. Combined 45.7M across the three — more than all other languages combined.
      This holds true despite all three being Spanish-origin companies.
    evidence:
      - "briefs/04b-uptodown-pages.yaml: traffic_by_language_from_pages → en = 14,536,285 (47.88%)"
      - "briefs/05b-softonic-com-pages.yaml: traffic_by_language_from_pages → en = 29,266,262 (77.0%)"
      - "briefs/06b-malavida-pages.yaml: traffic_by_language_from_pages → en = 1,890,925 (29.1%)"

  - pattern: "All competitors use subdomain-based language architecture"
    detail: >
      All three use subdomains for language separation: {app}.{lang}.domain.com.
      This is the de facto standard for multilingual software download sites.
      Only softonic adds a separate ccTLD (.ru) for one market — and that strategy
      is underperforming (declining traffic, lower DR). This suggests subdomains on
      a single strong domain outperform separate country domains.
    evidence:
      - "briefs/04a-uptodown-struct.yaml: language_structure = 'subdomains', pattern = {app-name}.{lang}.uptodown.com"
      - "briefs/05a-softonic-com-struct.yaml: language_structure = 'subdomains', app.LANG.softonic.com"
      - "briefs/05c-softonic-ru.yaml: domain_strategy = 'separate_domain', softonic.ru declining -578K"
      - "briefs/06a-malavida-struct.yaml: language_structure = 'subdomains', pattern = {app-slug}.{lang-code}.malavida.com"

  - pattern: "App pages drive 85-99% of traffic; category/home pages are marginal"
    detail: >
      Individual app pages (landing, download, versions) generate the vast majority of
      traffic. Category listings and homepages contribute under 5.5% across all competitors.
      This means multilingual expansion ROI is driven by translating app pages, not
      building elaborate category structures.
    evidence:
      - "briefs/04b-uptodown-pages.yaml: app pages = 94.7% (app_pages_with_lang 84.98% + app_pages_no_lang 9.68%)"
      - "briefs/05b-softonic-com-pages.yaml: app pages = 97.0% (app_download 71.7% + app_main 23.4% + app_versions 1.9%)"
      - "briefs/06b-malavida-pages.yaml: app_pages = 98.6%"

  - pattern: "Android dominates platform traffic over Windows by 5-11x across all competitors"
    detail: >
      Mobile-first content generates the overwhelming majority of traffic.
      Windows content is a distant second. This pattern is consistent across all three,
      regardless of their language mix or total traffic level.
    evidence:
      - "briefs/04b-uptodown-pages.yaml: android 25,157,933 (82.9%) vs windows 4,410,167 (14.5%)"
      - "briefs/05b-softonic-com-pages.yaml: /android path 25,963,104 vs /download+/root 10,082,594"
      - "briefs/06b-malavida-pages.yaml: android 5,800,600 (89.2%) vs windows 522,586 (8.0%)"

  - pattern: "French is a consistently strong language across all competitors"
    detail: >
      French ranks in the top 4-7 languages for all three competitors and shows the most
      balanced distribution (no single competitor dominates). Total 4.27M across all three.
      Malavida derives 17.9% of its total traffic from French — the highest fr share
      of any competitor. This validates freesoft's existing frees0ft.fr domain strategy.
    evidence:
      - "briefs/04b-uptodown-pages.yaml: fr = 1,347,516 (4.44%, #7 language)"
      - "briefs/05b-softonic-com-pages.yaml: fr = 1,755,847 (4.6%, #3 language on softonic.com)"
      - "briefs/06b-malavida-pages.yaml: fr = 1,164,613 (17.9%, #4 language)"

  - pattern: "Arabic is the biggest untapped language opportunity in the niche"
    detail: >
      Arabic generates 3.46M traffic on uptodown alone (their #2 language), but softonic
      and malavida have zero Arabic content. This is the highest-traffic single-competitor
      language by far, suggesting the MENA software download market is severely underserved.
    evidence:
      - "briefs/04b-uptodown-pages.yaml: ar = 3,463,699 (11.41%, #2 language)"
      - "briefs/05b-softonic-com-pages.yaml: no Arabic language detected"
      - "briefs/06b-malavida-pages.yaml: no Arabic language detected"

  - pattern: "Scale of multilingual coverage varies dramatically but doesn't correlate with total traffic"
    detail: >
      uptodown supports 17 languages (30.4M traffic), softonic supports 7 (38.4M), and
      malavida supports 8-14 (6.5M). Softonic has the highest traffic with the fewest
      languages — suggesting depth of content per language matters more than breadth of
      language coverage. However, uptodown's broad coverage gives it exclusive access
      to markets like Arabic (3.5M), Indonesian (1.6M), and Hindi (397K).
    evidence:
      - "briefs/04b-uptodown-pages.yaml: 17 languages, 30,366,469 total traffic"
      - "briefs/05b-softonic-com-pages.yaml: 6 languages, 38,017,115 traffic (plus softonic.ru)"
      - "briefs/06b-malavida-pages.yaml: 8 languages with traffic, 6,499,237 total"

