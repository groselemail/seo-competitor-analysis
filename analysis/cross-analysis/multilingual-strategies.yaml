# ==============================================================================
# EXPANSION INSIGHTS
# ==============================================================================

expansion_insights:
  most_valuable_languages:
    - language: "en"
      total_competitor_traffic: 45693472
      competitors_present: 3
      reasoning: >
        English is the #1 language across all competitors with 45.7M combined traffic.
        freesoft.net is on a .net TLD which is natural for English content. Must-have
        language for any expansion strategy. Highest total market by far.
    - language: "es"
      total_competitor_traffic: 9926039
      competitors_present: 3
      reasoning: >
        Spanish is #2 at 9.9M. All 3 competitors are Spanish companies and have strong
        Spanish content. High competition but massive market. Could be served via
        subfolder on existing domain or new .es domain.
    - language: "fr"
      total_competitor_traffic: 4267976
      competitors_present: 3
      reasoning: >
        French is #3 at 4.3M. freesoft already has frees0ft.fr domain — this is the
        lowest-hanging fruit for expansion. All competitors have strong French content,
        confirming market demand. Malavida gets 17.9% of its total traffic from French.
    - language: "ar"
      total_competitor_traffic: 3463699
      competitors_present: 1
      reasoning: >
        Arabic is #4 at 3.5M but only uptodown serves this language. Extremely low
        competition with high traffic potential. Major opportunity if freesoft can
        create Arabic content. MENA region is underserved by competitors.
    - language: "ru"
      total_competitor_traffic: 3129500
      competitors_present: 3
      reasoning: >
        Russian is #5 at 3.1M. freesoft.net's core market. All competitors serve Russian
        but softonic.ru is declining (-578K). The decline of softonic.ru creates an
        opportunity to capture migrating traffic.
    - language: "br"
