# ==============================================================================
# Phase 3: Language Potential Analysis
# Generated by task 16-language-potential
# Generated: 2026-03-06
# Input briefs: 11-our-state, 12-multilingual-analysis, 13-fr-market-analysis
# ==============================================================================

methodology:
  tam_definition: "Sum of competitor organic traffic in the language for software/download niche"
  sam_definition: "TAM adjusted by relevance factor — only download/app page traffic relevant to freesoft's content model"
  achievable_share_method: >
    Based on freesoft's DR relative to competitor DR, competitive density (number of
    established players), market dynamics (growing vs declining), and whether freesoft
    has an existing domain. Conservative estimates throughout — better to underestimate
    and overdeliver.
  relevance_factor_methodology: >
    For international competitors (uptodown, softonic, malavida), app/download pages
    generate 85-99% of traffic (uptodown 94.7%, softonic 97.0%, malavida 98.6%).
    Default relevance factor = 0.90 (conservative).
    For French market, per-competitor relevance factors used based on brief 13 data:
    clubic 0.80 (80% download pages), 01net 0.465 (46.5% downloads),
    commentcamarche 0.106 (10.6% downloads).
  data_sources:
    - "briefs/11-our-state.yaml — freesoft current traffic, DR, strengths/weaknesses"
    - "briefs/12-multilingual-analysis.yaml — competitor traffic per language (ALL locations)"
    - "briefs/13-fr-market-analysis.yaml — French market depth, declining competitors"

