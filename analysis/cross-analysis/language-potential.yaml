    - "vi"
  total_estimated_traffic_gain_all_languages: 660563
  total_estimated_traffic_gain_top_3: 359767
  total_estimated_traffic_gain_top_5: 480652
  top_3_languages: ["es", "en", "ar"]
  top_5_languages: ["es", "en", "ar", "fr", "ru"]
  current_total_traffic: 221827
  potential_total_with_all_languages: 882390
  growth_multiplier: "~4.0x"
  key_insight: >
    The software download niche has 75.2M total competitor traffic across 17 languages.
    freesoft currently captures only 0.3% of this total market (222K out of 75.2M).
    The top 5 languages alone could add 481K traffic — more than doubling the current
    portfolio. English and Spanish represent the largest absolute opportunities due to
    massive TAM, while Arabic and Indonesian offer the best competition-adjusted ROI
    (only 1 competitor each). French remains the lowest-risk expansion because of the
    existing frees0ft.fr domain and detailed declining-competitor intelligence.
  recommendation: >
    Phase 1 priority: Optimize existing domains (EN on freesoft.net, FR on frees0ft.fr,
    RU on freesoft.ru) — these require no new infrastructure and have the highest
    confidence estimates. Combined additional: ~253K traffic.
    Phase 2 priority: Add Spanish (es) and Arabic (ar) content via subfolders on
    freesoft.net — these are the two largest new-language opportunities with combined
    ~228K potential.
    Phase 3 priority: Brazilian Portuguese (br) and Indonesian (id) for emerging
    market expansion — combined ~96K potential with low competition.
    All other languages should only be considered as part of an automated multilingual
    content pipeline (batch rollout), not individual investments.

# ==============================================================================
# ASSUMPTIONS
# ==============================================================================

assumptions:
  - assumption: "Relevance factor of 0.90 for non-French languages"
    impact_if_wrong: >
      If actual download-page share is higher (95%+, as competitor data suggests),
      SAM values would increase ~5-10%, proportionally increasing estimated traffic.
      If lower (unlikely — all competitors are download-focused), estimates would decrease.
    source: >
      Based on briefs/12-multilingual-analysis.yaml patterns section: uptodown app
      pages 94.7%, softonic 97.0%, malavida 98.6%. We used 90% to be conservative.

  - assumption: "Achievable share of 0.4% for English market"
    impact_if_wrong: >
      English is the largest market (45.7M TAM). If share is 0.2% instead of 0.4%,
      additional traffic drops from 132K to 50K. If 0.6%, it rises to 215K.
      English estimate is the most sensitive to share assumption changes.
    source: >
      Based on freesoft.net DR 51 vs softonic DR 86, with 191K backlinks providing
      foundation. 0.4% represents ~5x growth over current 32K — ambitious but
      supported by the DR-to-traffic gap identified in brief 11.

  - assumption: "Achievable share of 1.5% for Spanish (starting from zero)"
    impact_if_wrong: >
      If only 0.5% (more conservative), Spanish drops from 134K to 45K and falls
      below French in priority. If 2.5% (more aggressive), it rises to 223K.
      Spanish is high-risk/high-reward due to all 3 competitors being native Spanish.
    source: >
      Conservative estimate for new entrant against 3 established native competitors.
      Brief 12 shows all competitors are Spanish-origin companies.

  - assumption: "3% achievable share for single-competitor languages (ar, id, th, tr)"
    impact_if_wrong: >
      If 1% instead: ar drops from 94K to 31K, id from 43K to 14K. These languages
      would move significantly lower in priority. If 5%: ar rises to 156K, id to 71K.
      The assumption is that low competition makes entry easier, but entry barriers
      (RTL for Arabic, local market knowledge) could reduce achievable share.
    source: >
      Based on only 1 competitor (uptodown) being present. Brief 12 confirms
      softonic and malavida have 0 traffic in these languages.

  - assumption: "French moderate estimate of 87K from brief 13"
    impact_if_wrong: >
      Conservative (35K) would reduce French additional to 13K, making it lower
      priority. Optimistic (175K) would make it the #2 language opportunity.
      The estimate depends heavily on frees0ft.fr's ability to raise DR from 23
      and diversify beyond null's brawl dependency.
    source: "briefs/13-fr-market-analysis.yaml, frees0ft_fr_position.opportunity_size"

  - assumption: "softonic.ru decline of 578K continues and 7% is capturable by freesoft.ru"
    impact_if_wrong: >
      If softonic.ru stabilizes, capturable traffic drops to ~15K (organic growth only).
      If decline accelerates and freesoft captures more (15%), additional rises to ~102K.
      The softonic.ru decline is well-documented but capture rate is speculative.
    source: "briefs/12-multilingual-analysis.yaml (softonic_ru traffic_trend: -578K)"

  - assumption: "TAM represents only analyzed competitors — real market is larger"
    impact_if_wrong: >
      For languages with 1 competitor (ar, id, th, tr, kr, cn, ro), the real TAM
      is likely 2-5x the observed value (other local competitors not analyzed).
      This means our estimates for these languages are conservative lower bounds.
      Arabic TAM could be 7-17M if local Arabic download sites were included.
    source: >
      Brief 12 only analyzes uptodown, softonic, and malavida.
      Many local/regional download sites exist but were not in scope.

  - assumption: "freesoft.net's .net TLD can effectively rank in any language via subfolders"
    impact_if_wrong: >
      If Google strongly penalizes non-ccTLD domains for local-language queries,
      achievable shares would be significantly lower for new languages served via
      freesoft.net subfolders. This would push toward ccTLD strategy (like frees0ft.fr)
      for each new language, dramatically increasing costs.
    source: >
      Brief 12 shows all competitors use subdomains on single domains successfully.
      Brief 11 notes freesoft.net's .net TLD 'allows targeting any language market'.
