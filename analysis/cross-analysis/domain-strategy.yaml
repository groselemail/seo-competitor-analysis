# =============================================================================
# RECOMMENDATION
# =============================================================================

recommendation:
  chosen_option: "D — Hybrid: keep freesoft.ru, consolidate everything else on freesoft.net subdomains"

  reasoning: >
    Option D is the best risk-adjusted choice for freesoft's situation. It protects
    the most critical asset (freesoft.ru's 168K traffic, 75.6% of portfolio) while
    enabling multilingual expansion on freesoft.net and fixing the frees0ft.fr
    spelling issue. The key insight: freesoft cannot afford a failed migration.

    Full consolidation (Option B) would be the theoretically optimal long-term
    structure — it matches what the most successful competitors do. But it requires
    migrating freesoft.ru to a domain with LOWER DR (51 vs 59), in a market where
    .ru ccTLD provides Yandex trust signals. The risk of a 20-40% traffic drop
    (33K-67K visits) on the primary domain is too high for a small team.

    Option D provides a safe path: consolidate what CAN be consolidated (frees0ft.fr
    → fr.freesoft.net, new languages on *.freesoft.net) while preserving what MUST
    be preserved (freesoft.ru). If Option D proves successful and freesoft.net's DR
    grows past freesoft.ru's DR 59, then full consolidation (migrating .ru to
    ru.freesoft.net) can be considered as an OPTIONAL future phase with much lower
    risk because the receiving domain would then be stronger.

  key_factors:
    - factor: "freesoft.ru's 168K traffic must be protected"
      weight: "critical"
      reasoning: >
        75.6% of freesoft's total portfolio. Migrating this to a lower-DR domain
        with no .ru ccTLD is the single biggest risk in any strategy. Options A, B,
        and E all require this migration. Only C and D avoid it.
      source: "briefs/16-language-potential.yaml (freesoft_baseline.freesoft_ru)"

    - factor: "Competitor precedent supports subdomains on gTLD"
      weight: "high"
      reasoning: >
        All 3 top competitors (uptodown, softonic.com, malavida) use subdomains on
        their primary .com domain (DR 73-86). The subdomain approach is the proven
        winner in this niche, achieving 2.2M combined RU traffic. Option D uses this
        approach for freesoft.net while keeping the proven .ru domain intact.
      source: "briefs/14-domain-structures.yaml (effectiveness_ranking, comparison_matrix)"

    - factor: "frees0ft.fr has negligible SEO equity worth preserving"
      weight: "high"
      reasoning: >
        DR 23, only 24 followed referring domains, traffic concentrated on a single
        page (null's brawl). The spelling issue (zero vs 'o') creates brand confusion.
        Migrating to fr.freesoft.net has minimal downside and fixes a real brand problem.
      source: "briefs/16-language-potential.yaml (freesoft_baseline.frees0ft_fr)"

    - factor: "8 languages need to be supported (5 new)"
      weight: "high"
      reasoning: >
        Brief 16 recommends 5 new languages (es, ar, br, id, vi) with combined
        potential of ~354K additional traffic. These need infrastructure on freesoft.net.
        The hybrid model supports this without complicating freesoft.ru.
      source: "briefs/16-language-potential.yaml (summary.new_languages_recommended)"

    - factor: "softonic.ru hybrid decline is a warning, not a dealbreaker"
      weight: "medium"
      reasoning: >
        softonic.ru is declining (-578K) under a hybrid model, but this appears driven
        by content stagnation (-291K keywords) and market forces (trashbox.ru also down
        47%), not the hybrid structure itself. freesoft.ru can avoid this fate through
        active content optimization per brief 16 recommendations (+55K growth potential).
      source: "briefs/14-domain-structures.yaml (structures[1] softonic hybrid, structures[4] trashbox)"

    - factor: "Reversibility — Option D preserves all future options"
      weight: "medium"
      reasoning: >
        Option D doesn't burn any bridges. If freesoft.net grows its DR past 59 through
        multilingual expansion and link building, full consolidation (migrating .ru to
        ru.freesoft.net) becomes SAFER because the receiving domain would then be stronger.
        Options A, B, and E are harder to reverse.

  # ---------------------------------------------------------------------------
  # MIGRATION PLAN
  # ---------------------------------------------------------------------------
  migration_plan:

    phase_1:
      name: "Quick wins — zero migration risk"
      timeline: "Month 1-2"
      actions:
        - action: "Implement cross-domain hreflang between freesoft.ru ↔ freesoft.net"
          detail: >
            Add hreflang tags linking Russian pages on freesoft.ru to their English
            equivalents on freesoft.net (and vice versa). This immediately tells search
            engines the domains are related, reducing content duplication issues.
          technical: >
            Use <link rel='alternate' hreflang='ru' href='https://freesoft.ru/...' />
            and <link rel='alternate' hreflang='en' href='https://freesoft.net/...' />
            on corresponding pages. Can be implemented via HTTP headers or XML sitemaps
            if HTML injection is difficult.
          risk: "none"
        - action: "Set up DNS infrastructure for *.freesoft.net subdomains"
          detail: >
            Configure wildcard DNS or specific subdomain records for future language
            subdomains (fr, es, ar, pt, id, vi). No content changes yet — just
            infrastructure preparation.
          risk: "none"
        - action: "Optimize existing freesoft.net English content"
          detail: >
            Per brief 16, freesoft.net has DR 51 with 191K backlinks but only 32K traffic.
            This DR-to-traffic gap is the largest of all 3 domains. Content optimization
            on existing pages is the highest-ROI immediate action.
          risk: "none"
          estimated_traffic_impact: "+132K additional EN traffic (brief 16 estimate)"
        - action: "Optimize existing freesoft.ru Russian content"
          detail: >
            Capture softonic.ru decline traffic. Optimize Windows content (2,609 pages
            generating only 5.7% of traffic). Diversify beyond TikTok Mod dependency
            (26.3% of traffic from one app).
          risk: "none"
          estimated_traffic_impact: "+55K additional RU traffic (brief 16 estimate)"
      risk: "none — all actions are additive with zero migration"
      estimated_traffic_impact: "Up to +187K from existing domain optimization"

    phase_2:
      name: "French migration + first new language"
      timeline: "Month 2-4"
      actions:
        - action: "Migrate frees0ft.fr to fr.freesoft.net"
          detail: >
            Set up fr.freesoft.net subdomain. Copy all French content from frees0ft.fr.
            Implement 301 redirects from frees0ft.fr/* to fr.freesoft.net/*.
            Update hreflang to include fr.freesoft.net.
          risk_assessment: >
            LOW RISK. frees0ft.fr has DR 23 and only 24 followed referring domains.
            The spelling issue (zero vs 'o') means the domain brand is already compromised.
            Total traffic at risk: 21.6K, and the 301 redirects should preserve most of it.
            Even a 50% traffic loss would only cost ~11K visits — recoverable within 3-6
            months as fr.freesoft.net benefits from freesoft.net's DR 51.
          redirect_plan: >
            1. Deploy identical content on fr.freesoft.net
            2. Implement page-by-page 301 redirects from frees0ft.fr to fr.freesoft.net
            3. Update Google Search Console — add fr.freesoft.net property
            4. Monitor fr.freesoft.net indexing for 2-4 weeks
            5. After 3 months, consider discontinuing frees0ft.fr domain renewal
        - action: "Launch es.freesoft.net (Spanish — new language)"
          detail: >
            Spanish is the #1 priority new language (134K estimated gain, 9.9M TAM).
            Create Spanish content using automated translation + human review for
            top 500-1000 app pages. Implement hreflang connecting es.freesoft.net
            to freesoft.net (EN) and freesoft.ru (RU).
          estimated_traffic_impact: "+134K Spanish traffic (brief 16 estimate, 18-24 month horizon)"
      risk: "low — frees0ft.fr migration is low-stakes; Spanish launch is greenfield (no existing traffic to lose)"
      estimated_traffic_impact: "+65K French growth + 134K Spanish new market"

    phase_3:
      name: "Expand to high-potential languages"
      timeline: "Month 4-8"
      actions:
        - action: "Launch ar.freesoft.net (Arabic)"
          detail: >
            Arabic is #3 priority (93K estimated gain). Only 1 competitor (uptodown) serves
            Arabic — massive gap. Requires RTL infrastructure. Consider Arabic-first approach
            for MENA-popular apps (WhatsApp, TikTok, PUBG Mobile).
          estimated_traffic_impact: "+93K Arabic traffic (brief 16 estimate)"
        - action: "Launch pt.freesoft.net (Brazilian Portuguese)"
          detail: >
            #6 priority (53K estimated gain). softonic absent from this market. Large
            Brazilian mobile market. Portuguese content creation can piggyback on Spanish
            content infrastructure (linguistic similarity).
          estimated_traffic_impact: "+53K Brazilian Portuguese traffic"
        - action: "Launch id.freesoft.net (Indonesian)"
          detail: >
            #7 priority (43K estimated gain). Only uptodown serves Indonesian, softonic
            tried and failed. Mobile-first market aligns with freesoft's Android content.
          estimated_traffic_impact: "+43K Indonesian traffic"
        - action: "Launch vi.freesoft.net (Vietnamese)"
          detail: >
            #8 priority (31K estimated gain). Growing Southeast Asian market.
          estimated_traffic_impact: "+31K Vietnamese traffic"
      risk: "low — all greenfield launches with no existing traffic at risk"
      estimated_traffic_impact: "+220K across 4 new languages (12-18 month horizon)"

    phase_4_optional:
      name: "OPTIONAL — Evaluate full consolidation of freesoft.ru"
      timeline: "Month 12-18 (only if conditions are met)"
      conditions_required:
        - "freesoft.net DR has grown past 59 (currently 51)"
        - "*.freesoft.net subdomains are performing well (validated approach)"
        - "Russian market trajectory is clearly understood (growing vs declining)"
        - "Team has capacity for a major migration project"
      actions:
        - action: "Evaluate whether to migrate freesoft.ru to ru.freesoft.net"
          detail: >
            By Month 12-18, freesoft.net's DR should have grown from language expansion
            and consolidated link building. IF freesoft.net DR > 59 (freesoft.ru DR),
            then migrating .ru content to ru.freesoft.net becomes LESS risky because
            the receiving domain is stronger. This is the opposite of today's situation
            where freesoft.net (DR 51) is weaker than freesoft.ru (DR 59).
          risk_if_conditions_met: "medium — but significantly lower than migrating today"
          risk_if_conditions_not_met: "Do NOT proceed — keep hybrid model indefinitely"
      risk: "This phase is OPTIONAL. If conditions are not met, the hybrid model works indefinitely."
      note: >
        Full consolidation is the theoretically optimal end state (matching top competitors),
        but it should only happen when the risk profile is favorable. The hybrid model is
        a perfectly viable permanent structure — softonic has operated one for years.

  # ---------------------------------------------------------------------------
  # RISK MITIGATION
  # ---------------------------------------------------------------------------
  risk_mitigation:
    - risk: "frees0ft.fr to fr.freesoft.net migration causes traffic drop"
      probability: "medium"
      impact: "low (21.6K traffic, mostly from single page)"
      mitigation:
        - "Implement page-by-page 301 redirects (not domain-level wildcard)"
        - "Deploy identical content on fr.freesoft.net BEFORE enabling redirects"
        - "Monitor Google Search Console indexing weekly for 4 weeks"
        - "Keep frees0ft.fr domain active with redirects for at least 12 months"
        - "If traffic drops >30% after 2 months, investigate and potentially add more content to fr.freesoft.net to compensate"

    - risk: "freesoft.ru traffic declines like softonic.ru and trashbox.ru"
      probability: "medium"
      impact: "high (168K traffic at stake)"
      mitigation:
        - "Active content optimization per brief 16 recommendations (Windows content, mod diversification)"
        - "Monitor monthly: if traffic drops 20%+ over 3 months, accelerate Phase 4 evaluation"
        - "Capture softonic.ru's declining traffic proactively (target same keywords)"
        - "If freesoft.ru DR drops below freesoft.net DR, this becomes a signal to consolidate"
      note: >
        This risk exists regardless of domain strategy. Even with Option C (keep everything),
        freesoft.ru faces market headwinds. Option D at least provides a fallback (ru.freesoft.net)
        if the .ru domain becomes unviable.

    - risk: "New language subdomains fail to gain traction (filehippo scenario)"
      probability: "low-medium"
      impact: "medium (investment without return)"
      mitigation:
        - "Launch with 500-1000 pages per language (not 30,000) — test before scaling"
        - "Focus on highest-demand apps first (apps that already rank on competitors)"
        - "Quality over quantity: filehippo failed because of poor localization, not structure"
        - "Monitor per-language traffic monthly; pivot or pause languages showing zero growth after 6 months"
      source: "briefs/14-domain-structures.yaml (structures[3] filehippo — cautionary tale)"

    - risk: "Cross-domain hreflang between .ru and .net causes indexing issues"
      probability: "low"
      impact: "medium"
      mitigation:
        - "Implement hreflang via XML sitemaps (most reliable for cross-domain)"
        - "Validate with Google Search Console international targeting report"
        - "Test on a small batch of 100 pages first before full rollout"
        - "Use Screaming Frog or similar tool to audit hreflang implementation monthly"

    - risk: "DR fragmentation between .ru and .net limits competitiveness"
      probability: "high (this is certain, not a risk)"
      impact: "medium"
      mitigation:
        - "Focus link building on freesoft.net (the international hub) to close the DR gap with competitors"
        - "freesoft.net has 191K existing backlinks (DR 51) — optimize existing backlink profile"
        - "As new languages launch, each subdomain generates additional backlinks that benefit the root domain"
        - "Target DR 60+ for freesoft.net within 12 months to approach competitor levels"
        - "If freesoft.net DR exceeds freesoft.ru DR, Phase 4 consolidation becomes viable"

  # ---------------------------------------------------------------------------
  # ESTIMATED TRAFFIC IMPACT
  # ---------------------------------------------------------------------------
  estimated_traffic_impact:
    current_total: 221827
    short_term:
      period: "0-3 months (Phase 1)"
      actions: "Hreflang setup, content optimization on existing domains"
      expected: >
        Minimal visible change. Hreflang implementation may cause minor fluctuations
        as search engines reprocess the relationship between domains.
        Content optimization effects begin appearing at month 2-3.
      estimated_traffic: "222K-240K (0-8% growth from existing optimization)"

    medium_term:
      period: "3-6 months (Phases 1-2 complete)"
      actions: "French migration done, Spanish launched, existing optimization showing results"
      expected: >
        frees0ft.fr traffic recovers on fr.freesoft.net. Spanish begins indexing.
        English and Russian content optimization shows measurable gains.
        frees0ft.fr may show temporary dip during redirect period.
      estimated_traffic: "280K-350K (26-58% growth)"
      breakdown:
        existing_en_growth: "+50K-130K"
        existing_ru_growth: "+20K-55K"
        fr_migration: "~20K (maintained/slight growth)"
        es_new: "10K-30K (early indexing)"

    long_term:
      period: "6-18 months (all phases)"
      actions: "All 5 new languages launched, existing domains fully optimized"
      expected: >
        All language subdomains indexed and growing. freesoft.net DR growing from
        consolidated link building. Combined portfolio approaches brief 16's
        estimated potential.
      estimated_traffic: "500K-880K (2.3x-4.0x growth)"
      breakdown:
        en_total: "~165K"
        ru_total: "~223K"
        fr_total: "~87K"
        es_total: "~134K"
        ar_total: "~94K"
        br_total: "~53K"
        id_total: "~43K"
        vi_total: "~31K"
      note: >
        Upper bound (880K) assumes all brief 16 estimates materialize.
        Lower bound (500K) assumes 60% of estimates materialize.
        Even at 60% achievement, this represents 2.3x growth.
      source: "briefs/16-language-potential.yaml (summary)"

  # ---------------------------------------------------------------------------
  # HREFLANG PLAN
  # ---------------------------------------------------------------------------
  hreflang_plan:
    approach: >
      Phased hreflang implementation using XML sitemaps as the primary mechanism
      (most reliable for cross-domain hreflang). HTML link tags as supplementary.
    why_xml_sitemaps: >
      Cross-domain hreflang (freesoft.ru ↔ *.freesoft.net) is better implemented
      via XML sitemaps than HTML tags because: (1) sitemaps can be maintained
      centrally, (2) no need to modify HTML on both domains simultaneously,
      (3) easier to validate and debug.

    phase_1_hreflang:
      timing: "Month 1-2"
      scope: "freesoft.ru ↔ freesoft.net (existing RU/EN pages)"
      implementation:
        - "Create language-specific XML sitemaps on each domain"
        - "freesoft.ru/sitemap-hreflang.xml declares Russian pages + links to EN equivalents"
        - "freesoft.net/sitemap-hreflang.xml declares English pages + links to RU equivalents"
        - "Include x-default pointing to freesoft.net for non-matched languages"
      example: |
        <!-- In freesoft.net/sitemap-hreflang.xml -->
        <url>
          <loc>https://freesoft.net/android/minecraft</loc>
          <xhtml:link rel="alternate" hreflang="en" href="https://freesoft.net/android/minecraft"/>
          <xhtml:link rel="alternate" hreflang="ru" href="https://freesoft.ru/android/minecraft"/>
          <xhtml:link rel="alternate" hreflang="x-default" href="https://freesoft.net/android/minecraft"/>
        </url>

    phase_2_hreflang:
      timing: "Month 2-4"
      scope: "Add fr.freesoft.net + es.freesoft.net to hreflang cluster"
      implementation:
        - "Extend sitemaps to include French and Spanish alternates"
        - "All 4 language versions reference each other bidirectionally"
        - "Remove frees0ft.fr from hreflang after redirect period (3-6 months)"
      example: |
        <!-- Updated entry with all languages -->
        <url>
          <loc>https://freesoft.net/android/minecraft</loc>
          <xhtml:link rel="alternate" hreflang="en" href="https://freesoft.net/android/minecraft"/>
          <xhtml:link rel="alternate" hreflang="ru" href="https://freesoft.ru/android/minecraft"/>
          <xhtml:link rel="alternate" hreflang="fr" href="https://fr.freesoft.net/android/minecraft"/>
          <xhtml:link rel="alternate" hreflang="es" href="https://es.freesoft.net/android/minecraft"/>
          <xhtml:link rel="alternate" hreflang="x-default" href="https://freesoft.net/android/minecraft"/>
        </url>

    phase_3_hreflang:
      timing: "Month 4-8"
      scope: "Add ar, pt, id, vi subdomains to hreflang cluster"
      implementation:
        - "Extend sitemaps to include all 8 language versions"
        - "Automate sitemap generation — with 30K+ pages per language, manual maintenance is impractical"
        - "Validate bidirectional hreflang using Screaming Frog or similar tool"

    maintenance:
      - "Automate hreflang sitemap generation as part of content deployment pipeline"
      - "Audit hreflang implementation monthly via Google Search Console international targeting report"
      - "Monitor for common errors: missing return tags, incorrect language codes, broken URLs"

# =============================================================================
# KEY DECISION POINTS
# =============================================================================

key_decision_points:
  - decision: "When to execute Phase 4 (full consolidation)"
    trigger: "freesoft.net DR exceeds 59 AND *.freesoft.net subdomains show strong performance"
    default_if_unclear: "Do NOT consolidate. Keep hybrid model."
    note: >
      This is the biggest strategic decision. If freesoft.net grows to DR 65+
      with successful multilingual subdomains, full consolidation would create
      a single domain rivaling malavida.com (DR 73). But if freesoft.net stays
      at DR 51-55, the migration risk outweighs the benefits.

  - decision: "What to do if freesoft.ru declines significantly"
    trigger: "freesoft.ru traffic drops below 100K (40%+ decline)"
    action: >
      Accelerate Phase 4 evaluation. If .ru market is contracting regardless
      of content quality, consolidation to ru.freesoft.net becomes less risky
      because there's less traffic to lose.

  - decision: "Whether to maintain frees0ft.fr domain after migration"
    trigger: "fr.freesoft.net traffic recovers to frees0ft.fr levels"
    action: >
      After 12 months, if fr.freesoft.net has stabilized, stop renewing frees0ft.fr
      domain (keep redirects active until then). Save the annual renewal cost.

  - decision: "Whether to add lower-priority languages (it, de, th, tr, kr, etc.)"
    trigger: "Automated content pipeline is operational"
    action: >
      Brief 16 shows 9 additional languages with combined potential of ~53K traffic.
      These are only viable as part of an automated multilingual rollout — not
      individual manual investments. Launch only when automation makes the marginal
      cost per language near-zero.
    source: "briefs/16-language-potential.yaml (priority_ranking, ranks 9-17)"

