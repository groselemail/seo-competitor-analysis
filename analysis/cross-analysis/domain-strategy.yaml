options:

  # ---------------------------------------------------------------------------
  # Option A: Consolidate to freesoft.net with subfolders
  # ---------------------------------------------------------------------------
  - option: "A — Consolidate to freesoft.net with subfolders"
    description: >
      freesoft.net/ (English root)
      freesoft.net/ru/ (migrated from freesoft.ru)
      freesoft.net/fr/ (migrated from frees0ft.fr)
      freesoft.net/es/ (new)
      freesoft.net/ar/ (new)
      freesoft.net/pt-br/ (new)
    pros:
      - "All authority consolidated on one domain — combined DR could exceed any individual domain"
      - "Simplest hreflang implementation (all same domain)"
      - "One domain to promote, build links for, and maintain"
      - "Simplest technical implementation — no DNS changes per language"
      - "Scalable: adding a new language = adding a new subfolder"
    cons:
      - "HIGH RISK: migrating freesoft.ru (168K traffic, DR 59) could cause 20-40% traffic drop for 3-6 months"
      - "Losing .ru ccTLD forfeits Yandex preference for local domains — critical for Russia/CIS"
      - "The ONLY folder-based multilingual site in competitor data (filehippo) failed catastrophically — 22.7K non-EN pages with zero traffic"
      - "Need proper 301 redirects from both .ru and .fr domains — large-scale redirect mapping"
      - "freesoft.net currently only has DR 51 — lower than freesoft.ru's DR 59"
      - "No competitor in the download niche uses subfolders successfully"
    risk_level: "high"
    risk_detail: >
      The 168K traffic on freesoft.ru is 75.6% of freesoft's total portfolio.
      Migrating this to a subfolder on a domain with LOWER DR (51 vs 59) is
      extremely risky. The .ru ccTLD provides Yandex trust signals that would
      be lost. filehippo's folder failure (brief 14) serves as a warning — though
      that failure may reflect localization quality rather than structural issues.
    competitor_precedent: >
      NEGATIVE precedent only. filehippo.com is the only folder-based multilingual
      site in our data, and its multilingual expansion failed completely: ~22,700
      non-English pages generating zero traffic despite DR 77. No successful competitor
      uses folders for multilingual content in the software download niche.
    competitor_precedent_source: "briefs/14-domain-structures.yaml (structures[3] filehippo)"
    estimated_timeline: "8-12 months"
    traffic_impact:
      short_term: "Potential 20-40% drop during freesoft.ru migration (33K-67K traffic at risk)"
      long_term: "Consolidated authority should exceed sum of parts after 12+ months, but recovery is NOT guaranteed"

  # ---------------------------------------------------------------------------
  # Option B: Consolidate to freesoft.net with subdomains
  # ---------------------------------------------------------------------------
  - option: "B — Consolidate to freesoft.net with subdomains"
    description: >
      en.freesoft.net or freesoft.net (English root)
      ru.freesoft.net (migrated from freesoft.ru)
      fr.freesoft.net (migrated from frees0ft.fr)
      es.freesoft.net (new)
      ar.freesoft.net (new)
      pt.freesoft.net (new)
    pros:
      - "Matches dominant competitor approach — uptodown, softonic.com, malavida all use subdomains"
      - "Shared domain authority across all language versions (single DR applies to *.freesoft.net)"
      - "Unified brand — 'freesoft.net' recognized across all markets"
      - "Easier hreflang implementation than cross-domain (all *.freesoft.net)"
      - "Scales well — adding a new language = adding a new subdomain"
      - "Strong competitor precedent: subdomain sites average DR 79.5 and 2.2M combined RU traffic"
    cons:
      - "HIGH RISK: migrating freesoft.ru (168K traffic, DR 59) still risks significant traffic loss"
      - "Losing .ru ccTLD forfeits Yandex local trust signals for Russia/CIS market"
      - "freesoft.net DR 51 is the receiving domain — LOWER than freesoft.ru DR 59"
      - "DNS complexity increases with each language × app combination (if using per-app subdomains later)"
      - "Domain-wide penalty would affect ALL languages simultaneously"
      - "301 redirect mapping required for 30,000+ pages across two domains"
    risk_level: "medium-high"
    risk_detail: >
      Same core risk as Option A: migrating freesoft.ru's 168K traffic to a lower-DR
      domain. However, the subdomain approach has strong competitor precedent (3/3 top
      competitors use it). The structural risk is lower than folders, but the migration
      risk for freesoft.ru remains the key concern.
    competitor_precedent: >
      STRONG positive precedent. All 3 top multilingual competitors use subdomains:
      uptodown.com (14 languages, 964K RU traffic), softonic.com (9 languages, DR 86),
      malavida.com (14 languages, DR 73, 1M+ RU traffic). This is the dominant approach
      in the software download niche. Combined 2.2M RU traffic across these sites.
    competitor_precedent_source: "briefs/14-domain-structures.yaml (comparison_matrix.subdomains)"
    estimated_timeline: "6-10 months"
    traffic_impact:
      short_term: "Potential 20-40% drop during freesoft.ru migration (33K-67K traffic at risk)"
      long_term: "Strongest long-term authority consolidation. Competitor precedent suggests DR could reach 60+ within 12 months."

  # ---------------------------------------------------------------------------
  # Option C: Keep separate domains, expand on .net
  # ---------------------------------------------------------------------------
  - option: "C — Keep separate domains, expand new languages on freesoft.net"
    description: >
      freesoft.ru — keep as-is (no migration)
      frees0ft.fr — keep as-is (no migration)
      freesoft.net — remains EN + becomes hub for new languages:
        es.freesoft.net, ar.freesoft.net, pt.freesoft.net, id.freesoft.net, vi.freesoft.net
      Add cross-domain hreflang: freesoft.ru ↔ freesoft.net ↔ frees0ft.fr
    pros:
      - "ZERO risk to freesoft.ru's 168K traffic — no migration whatsoever"
      - "ZERO risk to frees0ft.fr's 21.6K traffic"
      - "Fastest to implement — just add subdomains to freesoft.net for new languages"
      - ".ru ccTLD preserves Yandex local trust signals"
      - "Can start adding new languages immediately while monitoring performance"
    cons:
      - "Authority permanently fragmented across 3+ domains (DR 51, 59, 23 remain separate)"
      - "frees0ft.fr spelling issue REMAINS — brand confusion continues"
      - "Cross-domain hreflang is technically complex and harder to maintain"
      - "New languages on freesoft.net only benefit from DR 51, not combined authority"
      - "Competitors with consolidated domains (DR 73-86) have structural advantage"
      - "Triple maintenance cost continues for existing domains"
      - "frees0ft.fr has only 24 followed referring domains — negligible SEO value being preserved"
    risk_level: "low"
    risk_detail: >
      Zero migration risk. The only risk is opportunity cost — permanently fragmented
      authority means new language subdomains on freesoft.net only benefit from DR 51,
      while competitors operate at DR 73-86.
    competitor_precedent: >
      NO competitor in our data uses this approach successfully. The closest analog
      (softonic.com + softonic.ru) is technically a hybrid, not a separate-domains-
      plus-expansion model. freesoft's 3 separate domains already mirror the weakest
      competitor pattern in brief 14.
    competitor_precedent_source: "briefs/14-domain-structures.yaml (freesoft_considerations.observations)"
    estimated_timeline: "2-3 months for new language subdomains + hreflang"
    traffic_impact:
      short_term: "Zero disruption to existing traffic"
      long_term: "Weakest long-term authority. New languages compete at DR 51 against competitors at DR 73-86."

  # ---------------------------------------------------------------------------
  # Option D: Hybrid — keep .ru, consolidate rest on .net subdomains
  # ---------------------------------------------------------------------------
  - option: "D — Hybrid: keep freesoft.ru, consolidate everything else on freesoft.net subdomains"
    description: >
      freesoft.ru — keep as-is (168K traffic, DR 59 — PROTECTED)
      freesoft.net — becomes international multilingual hub:
        freesoft.net or en.freesoft.net (English)
        fr.freesoft.net (migrate from frees0ft.fr — fixes spelling issue)
        es.freesoft.net (new Spanish)
        ar.freesoft.net (new Arabic)
        pt.freesoft.net (new Brazilian Portuguese)
        id.freesoft.net (new Indonesian)
        vi.freesoft.net (new Vietnamese)
      Cross-domain hreflang: freesoft.ru ↔ *.freesoft.net for Russian ↔ other languages
    pros:
      - "PROTECTS freesoft.ru's 168K traffic — zero migration risk for largest domain"
      - "FIXES frees0ft.fr spelling by migrating to fr.freesoft.net — low risk (DR 23, only 24 followed backlinks)"
      - "Scalable — new languages added as freesoft.net subdomains (leveraging shared DR)"
      - "Competitor-validated approach — similar to softonic.com + softonic.ru hybrid"
      - "Preserves .ru ccTLD Yandex trust signals for Russian market"
      - "freesoft.net subdomains consolidate authority for all non-Russian languages"
      - "French migration is low-risk: frees0ft.fr DR 23 with 24 followed referring domains — negligible equity to lose"
      - "Enables future full consolidation if desired (optional Phase 3: ru.freesoft.net)"
    cons:
      - "Authority split between .ru (DR 59) and .net (DR 51) — two domains to build links for"
      - "Cross-domain hreflang between .ru and .net is more complex than single-domain hreflang"
      - "softonic.ru (same hybrid model) is in decline: -578K traffic, 36-point DR gap vs .com"
      - "New languages only benefit from freesoft.net's DR 51, not combined authority"
      - "Two separate Google Search Console properties to manage (.ru + .net)"
      - "Risk that freesoft.ru follows softonic.ru's decline trajectory if Russian market headwinds continue"
    risk_level: "low-medium"
    risk_detail: >
      freesoft.ru (168K, DR 59) stays untouched — zero risk to primary traffic.
      frees0ft.fr migration is low risk: DR 23 with only 24 followed referring domains
      and traffic concentrated on a single page. The main risk is OPPORTUNITY cost:
      authority remains split between .ru and .net, limiting the authority available
      to new language subdomains. The softonic.ru decline is a warning signal, but
      softonic.ru's issues (content stagnation, -291K keywords) may not apply to
      freesoft.ru if content optimization continues per brief 16 recommendations.
    competitor_precedent: >
      MODERATE precedent. softonic uses .com + .ru hybrid (subdomains on .com, separate
      .ru domain). softonic.com is highly successful (DR 86), but softonic.ru is declining
      (DR 50, -578K traffic). The hybrid model works when BOTH domains are actively
      maintained. Key lesson: the .ru domain needs ongoing investment to avoid softonic.ru's fate.
    competitor_precedent_source: "briefs/14-domain-structures.yaml (structures[1] softonic hybrid)"
    estimated_timeline: "3-6 months"
    traffic_impact:
      short_term: "Minimal disruption. Only frees0ft.fr traffic (21.6K) has any migration risk, and that risk is low."
      long_term: "Partial authority consolidation on .net for international languages. Not as strong as full consolidation (Option B) but much safer."

  # ---------------------------------------------------------------------------
  # Option E: Consolidate under freesoft.ru with subdomains
  # ---------------------------------------------------------------------------
  - option: "E — Consolidate to freesoft.ru with subdomains"
    description: >
      freesoft.ru — root domain (Russian)
      en.freesoft.ru (English — migrated from freesoft.net)
      fr.freesoft.ru (French — migrated from frees0ft.fr)
      es.freesoft.ru (new Spanish)
      ar.freesoft.ru (new Arabic)
    pros:
      - "Highest existing DR (59) — strongest foundation"
      - "No migration needed for Russian content (largest traffic source)"
      - "Consolidates all authority under single domain"
    cons:
      - "CRITICAL: .ru ccTLD signals 'Russian site' to Google — severely hinders international targeting"
      - "No competitor in the download niche uses a .ru domain for international content"
      - "Non-Russian users may distrust .ru domain for downloads (security perception)"
      - "Yandex preference for .ru would NOT extend to non-Russian subdomains"
      - "Would need to migrate freesoft.net (DR 51, 191K backlinks) — loses .net international advantage"
      - "Spanish, Arabic, Portuguese users unlikely to engage with .ru domain"
    risk_level: "high"
    risk_detail: >
      While freesoft.ru has the highest DR (59), the .ru ccTLD creates fundamental
      limitations for international SEO. Google treats .ru as geo-targeted to Russia.
      Serving English, Spanish, or Arabic content on a .ru domain fights against
      search engine geo-targeting signals. No competitor uses this approach — all
      top sites use .com (or equivalent gTLD) for international content.
    competitor_precedent: >
      ZERO precedent. No competitor in the software download niche uses a .ru domain
      for multilingual international content. All successful multilingual sites use
      .com as their international hub. Even softonic kept .com as the multilingual
      domain and used .ru ONLY for Russian content.
    competitor_precedent_source: "briefs/14-domain-structures.yaml (all structures)"
    estimated_timeline: "8-12 months"
    traffic_impact:
      short_term: "Moderate risk — migrating freesoft.net's 32K traffic and losing .net TLD advantages"
      long_term: "Structurally disadvantaged for non-Russian markets due to .ru TLD perception"
    verdict: "NOT RECOMMENDED — .ru ccTLD is fundamentally incompatible with international multilingual targeting"

